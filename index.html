<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBC Solar · Telemetry</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --navy:     #0d1b2a;
  --navy2:    #162232;
  --navy3:    #1e2e40;
  --gold:     #c9a84c;
  --gold-dim: #8a6e2e;
  --gold-bg:  #c9a84c18;
  --text:     #f0f4f8;
  --muted:    #7a8fa3;
  --border:   #ffffff12;
  --border2:  #ffffff20;
  --green:    #4caf7d;
  --red:      #e05c4a;
  --font:     'Poppins', sans-serif;
}

html, body { height:100%; background:var(--navy); color:var(--text); font-family:var(--font); font-size:14px; overflow:hidden; }

.shell { display:grid; grid-template-rows:52px auto 1fr; height:100vh; }
#mainArea { display:flex; flex-direction:column; min-height:0; overflow:hidden; }
#mainArea > .plot-panel, #mainArea > .map-panel { flex:1; min-height:0; }

/* ── HEADER ── */
header { display:flex; align-items:center; gap:12px; padding:0 20px; background:var(--navy2); border-bottom:1px solid var(--border); }
.logo { font-size:17px; font-weight:700; color:var(--gold); white-space:nowrap; letter-spacing:.01em; }
.logo span { color:var(--text); font-weight:500; }

/* ── CARD STRIP ── */
.card-strip {
  display:flex; flex-wrap:wrap;
  border-bottom:1px solid var(--border); background:var(--navy2);
  flex-shrink:0;
}

.metric-card {
  flex:1 1 140px; padding:11px 16px 10px;
  border-right:1px solid var(--border); border-bottom:1px solid var(--border);
  cursor:pointer; position:relative; user-select:none; transition:background .15s;
}

/* on wide screens: single row, no wrapping, no bottom borders on cards */
@media (min-width:960px) {
  .card-strip { flex-wrap:nowrap; }
  .metric-card { border-bottom:none; flex:1 0 140px; }
  .map-card-separator { display:flex !important; }
}
.metric-card:hover, .metric-card.active { background:var(--navy3); }

.metric-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--card-color,var(--gold)); opacity:.3; transition:opacity .2s;
}
.metric-card:hover::before, .metric-card.active::before { opacity:.9; }
.metric-card::after {
  content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px;
  background:var(--card-color,var(--gold)); transform:scaleX(0); transition:transform .2s ease;
}
.metric-card.active::after { transform:scaleX(1); }

.mc-label { font-size:12px; font-weight:500; color:var(--muted); letter-spacing:.02em; margin-bottom:5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mc-value-row { display:flex; align-items:baseline; gap:5px; }
.mc-value { font-size:32px; font-weight:700; line-height:1; color:var(--card-color,var(--text)); white-space:nowrap; transition:color .3s; }
.mc-value.no-data { font-size:22px; color:var(--muted); font-weight:400; }
.mc-unit { font-size:13px; color:var(--muted); font-weight:400; }
.mc-bar-track { height:2px; background:var(--border); border-radius:1px; margin-top:9px; overflow:hidden; }
.mc-bar-fill { height:100%; border-radius:1px; background:var(--card-color,var(--gold)); transition:width .8s cubic-bezier(.4,0,.2,1); opacity:.5; }
.mc-delta { font-size:12px; font-weight:500; margin-top:5px; color:var(--muted); transition:color .4s; }
.delta-up { color:var(--green); } .delta-dn { color:var(--red); }

/* ── RESPONSIVE METRIC VALUE SCALING ── */
@media (max-width:600px) {
  .mc-value { font-size:22px !important; }
  .mc-value.no-data { font-size:16px !important; }
  .metric-card { flex:1 1 120px; padding:9px 12px 8px; }
}

/* map card special */
.map-card .mc-value { font-size:18px; font-weight:600; }

/* ── MAP CARD BUTTON ── */
.map-card-separator {
  /* vertical on wide screens, horizontal on small */
  width:1px; background:var(--border2); flex-shrink:0; align-self:stretch; margin:8px 0;
}

/* on small screens: separator becomes a horizontal rule spanning full width */
@media (max-width:959px) {
  .map-card-separator {
    width:100%; height:1px; margin:0; align-self:auto;
  }
  .map-card-btn {
    flex-direction:row !important;
    width:100%; min-width:unset !important;
    padding:10px 20px !important;
    gap:12px !important;
    justify-content:flex-start !important;
    border-left:none !important;
    border-top:2px solid rgba(96,165,250,0.35) !important;
  }
  .map-card-btn:hover { border-top-color:rgba(96,165,250,0.75) !important; }
  .map-card-btn.active { border-top-color:#60a5fa !important; }
  .map-card-btn::before { left:0; right:0; top:0; height:2px; width:auto; }
  .map-card-btn::after { bottom:-1px; left:0; right:0; height:2px; top:auto; width:auto; transform:scaleX(0); }
  .map-card-btn.active::after { transform:scaleX(1); }
  .map-card-icon { flex-shrink:0; }
  .map-card-label { font-size:12px; }
  .map-card-sub { display:none; }
}

.map-card-btn {
  flex:0 0 auto;
  min-width:110px;
  padding:0 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:8px;
  cursor:pointer;
  user-select:none;
  position:relative;
  border:none;
  background:linear-gradient(135deg, rgba(96,165,250,0.10) 0%, rgba(96,165,250,0.04) 100%);
  border-left:2px solid rgba(96,165,250,0.35);
  transition:background .18s, border-color .18s;
}
.map-card-btn:hover {
  background:linear-gradient(135deg, rgba(96,165,250,0.20) 0%, rgba(96,165,250,0.10) 100%);
  border-left-color:rgba(96,165,250,0.75);
}
.map-card-btn.active {
  background:linear-gradient(135deg, rgba(96,165,250,0.25) 0%, rgba(96,165,250,0.12) 100%);
  border-left-color:#60a5fa;
}
.map-card-btn::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:#60a5fa; opacity:.25; transition:opacity .2s;
}
.map-card-btn:hover::before, .map-card-btn.active::before { opacity:.85; }
.map-card-btn::after {
  content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px;
  background:#60a5fa; transform:scaleX(0); transition:transform .2s ease;
}
.map-card-btn.active::after { transform:scaleX(1); }
.map-card-icon {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  background:rgba(96,165,250,0.12); border-radius:8px;
  border:1px solid rgba(96,165,250,0.25);
  transition:background .18s, border-color .18s;
}
.map-card-btn:hover .map-card-icon, .map-card-btn.active .map-card-icon {
  background:rgba(96,165,250,0.22);
  border-color:rgba(96,165,250,0.55);
}
.map-card-label {
  font-size:11px; font-weight:600; color:#60a5fa;
  letter-spacing:.08em; text-transform:uppercase; line-height:1;
}
.map-card-sub {
  font-size:10px; color:var(--muted); font-weight:400; letter-spacing:.02em;
  transition:color .2s;
}
.map-card-btn:hover .map-card-sub, .map-card-btn.active .map-card-sub { color:#9cc9fc; }

/* ── PANEL ── */
.plot-panel { display:flex; flex-direction:column; min-height:0; overflow:hidden; }
.plot-empty { flex:1; display:flex; align-items:center; justify-content:center; }
.plot-empty-hint { font-size:14px; font-weight:500; color:var(--muted); }

/* shared toolbar */
.plot-toolbar {
  display:flex; align-items:center; gap:14px; padding:10px 20px;
  border-bottom:1px solid var(--border); background:var(--navy2);
  flex-shrink:0; flex-wrap:wrap;
}
.plot-name { font-size:16px; font-weight:700; color:var(--card-color,var(--text)); }
.plot-unit-badge { font-size:12px; font-weight:500; color:var(--muted); border:1px solid var(--border2); border-radius:4px; padding:2px 8px; }
.plot-help { font-size:12px; color:var(--muted); line-height:1.5; border-left:2px solid var(--gold-dim); padding-left:10px; max-width:340px; flex:1; }

/* time-domain controls */
.presets { display:flex; gap:5px; }
.preset { background:transparent; border:1px solid var(--border2); border-radius:4px; color:var(--muted); font-family:var(--font); font-size:12px; font-weight:500; padding:4px 10px; cursor:pointer; transition:color .15s,border-color .15s,background .15s; }
.preset:hover { color:var(--text); border-color:var(--gold-dim); }
.preset.on { color:var(--gold); border-color:var(--gold-dim); background:var(--gold-bg); }
.win-wrap { display:flex; align-items:center; gap:5px; }
.win-num { width:58px; text-align:right; background:var(--navy3); border:1px solid var(--border2); border-radius:4px; color:var(--text); font-family:var(--font); font-size:13px; padding:4px 8px; outline:none; }
.win-num:focus { border-color:var(--gold); }

/* canvas */
.canvas-wrap { flex:1; position:relative; min-height:0; }
#plotCanvas { position:absolute; inset:0; width:100%; height:100%; }

/* ── MAP PANEL ── */
.map-panel { display:flex; flex-direction:column; min-height:0; overflow:hidden; }

.map-toolbar {
  display:flex; flex-direction:column;
  border-bottom:1px solid var(--border); background:var(--navy2);
  flex-shrink:0;
}

/* Row 1: title + color-by + legend */
.map-toolbar-row1 {
  display:flex; align-items:center; flex-wrap:wrap; gap:10px;
  padding:9px 16px 8px;
  border-bottom:1px solid var(--border);
}
.map-toolbar-row1 .plot-name { flex-shrink:0; margin-right:4px; }

/* Row 2: scrubbers + replay + speed */
.map-toolbar-row2 {
  display:flex; align-items:center; flex-wrap:wrap; gap:10px;
  padding:8px 16px;
}

/* metric color picker */
.color-by { display:flex; align-items:center; gap:7px; flex-shrink:0; }
.color-by-label { font-size:12px; font-weight:500; color:var(--muted); white-space:nowrap; }
.color-by select {
  background:var(--navy3); border:1px solid var(--border2); border-radius:4px;
  color:var(--text); font-family:var(--font); font-size:12px; padding:4px 10px;
  outline:none; cursor:pointer;
}
.color-by select:focus { border-color:var(--gold); }

/* scrubber — each one is its own flex row so it can wrap independently */
.scrubber-wrap {
  display:flex; align-items:center; gap:7px;
  flex:1 1 260px; min-width:0;
}
.scrubber-label { font-size:12px; font-weight:500; color:var(--muted); white-space:nowrap; flex-shrink:0; }
input[type=range] {
  flex:1; min-width:80px; accent-color:var(--gold); height:3px; cursor:pointer;
}
input[type=time] {
  background:var(--navy3); border:1px solid var(--border2); border-radius:4px;
  color:var(--text); font-family:var(--font); font-size:10px; padding:2px 6px;
  outline:none; width:84px; flex-shrink:0;
}
input[type=time]:focus { border-color:var(--gold); }

/* replay */
.replay-btn {
  background:transparent; border:1px solid var(--border2); border-radius:4px;
  color:var(--muted); font-family:var(--font); font-size:12px; font-weight:500;
  padding:4px 14px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:color .15s,border-color .15s,background .15s;
}
.replay-btn:hover { color:var(--text); border-color:var(--gold); }
.replay-btn.playing { color:var(--gold); border-color:var(--gold-dim); background:var(--gold-bg); }

/* speed */
.speed-wrap { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.speed-label { font-size:12px; color:var(--muted); }
.speed-select { background:var(--navy3); border:1px solid var(--border2); border-radius:4px; color:var(--text); font-family:var(--font); font-size:12px; padding:3px 8px; outline:none; }

/* legend */
.map-legend { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.legend-grad {
  width:80px; height:6px; border-radius:3px;
  background:linear-gradient(to right,#4caf7d,#c9a84c,#e05c4a);
}
.legend-lo, .legend-hi { font-size:11px; color:var(--muted); }

/* leaflet container */
.map-wrap { flex:1; position:relative; min-height:0; }
#leafletMap { position:absolute; inset:0; }
/* navy tint sits over tiles but under Leaflet SVG pane (z-index 200) */


/* override leaflet chrome to fit theme */
.leaflet-control-attribution { background:rgba(13,27,42,.75) !important; color:var(--muted) !important; font-size:9px !important; }
.leaflet-control-attribution a { color:var(--muted) !important; }
.leaflet-bar a { background:var(--navy2) !important; color:var(--text) !important; border-color:var(--border2) !important; }
.leaflet-bar a:hover { background:var(--navy3) !important; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">UBC <span>Solar</span></div>
  </header>

  <div class="card-strip" id="cardStrip"></div>

  <div id="mainArea">
    <div class="plot-panel" id="plotPanel">
      <div class="plot-empty">
        <div class="plot-empty-hint">Select a metric above to view its plot, or open the Map view</div>
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
if (typeof L === 'undefined') {
  document.addEventListener('DOMContentLoaded', () => {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d1b2a;font-family:Poppins,sans-serif;color:#f0f4f8;flex-direction:column;gap:16px;padding:32px;text-align:center">
        <div style="font-size:18px;font-weight:700;color:#e05c4a">Leaflet failed to load</div>
        <div style="font-size:13px;color:#7a8fa3;max-width:400px;line-height:1.7">
          This page needs an internet connection to load the Leaflet map library from <code style="color:#c9a84c">unpkg.com</code>.<br><br>
          Serve the file via a local web server rather than opening it directly from disk, or ensure <code style="color:#c9a84c">unpkg.com</code> is reachable.
        </div>
        <div style="font-size:11px;color:#7a8fa3;border:1px solid #ffffff20;border-radius:6px;padding:10px 20px;">
          <code>python3 -m http.server 8080</code> &rarr; open <code>localhost:8080</code>
        </div>
      </div>`;
  });
  throw new Error('Leaflet (L) is not defined — CDN script failed to load.');
}
// ─── METRICS ───────────────────────────────────────────────────────────────
const METRICS = [
  { field:'motor_power',    label:'Motor Power',    unit:'kW',   color:'#e05c4a', transform:v=>v/1000, decimals:2, yMin:0,   yMax:5,
    help:'Electrical power drawn by the motor controller. High values indicate acceleration or hill climbing.' },
  { field:'array_power',    label:'Array Power',    unit:'kW',   color:'#c9a84c', transform:v=>v/1000, decimals:2, yMin:0,   yMax:3,
    help:'Solar panel output. Peaks in direct sunlight; drops in shade or cloud cover.' },
  { field:'battery_soc',    label:'Battery SOC',    unit:'%',    color:'#4caf7d', decimals:1, yMin:0,   yMax:100,
    help:'State of charge of the battery pack. A steady decline indicates net energy consumption.' },
  { field:'speed',          label:'Speed',          unit:'km/h', color:'#60a5fa', decimals:1, yMin:0,   yMax:100,
    help:'Vehicle speed. Compare with motor power to spot inefficient phases.' },
  { field:'steering_angle', label:'Steering Angle', unit:'°',    color:'#34d399', decimals:1, yMin:-45, yMax:45,
    help:'Steering wheel deflection. Large sustained angles increase rolling resistance.' },
  { field:'acceleration',   label:'Acceleration',   unit:'g',    color:'#a78bfa', decimals:2, yMin:-1,  yMax:1,
    help:'Longitudinal acceleration. Smooth profiles minimise energy loss.' },
];

const MAX_MS  = 3600 * 1000;
const history = {};   // field → [{t, v}]
const gpsHistory = []; // [{t, lat, lon}]
const latest  = {};

METRICS.forEach(m => { history[m.field] = []; latest[m.field] = { value:null, prev:null }; });

// ─── CARD STRIP ─────────────────────────────────────────────────────────────
const strip = document.getElementById('cardStrip');

// metric cards
METRICS.forEach(m => {
  const card = document.createElement('div');
  card.className = 'metric-card';
  card.id = 'card-' + m.field;
  card.style.setProperty('--card-color', m.color);
  card.innerHTML = `
    <div class="mc-label">${m.label}</div>
    <div class="mc-value-row">
      <div class="mc-value no-data" id="mcv-${m.field}">—</div>
      <div class="mc-unit">${m.unit}</div>
    </div>
    <div class="mc-bar-track"><div class="mc-bar-fill" id="mcb-${m.field}" style="width:0%"></div></div>
    <div class="mc-delta" id="mcd-${m.field}"></div>
  `;
  card.addEventListener('click', () => activateMetric(m.field));
  strip.appendChild(card);
});

// map card — clearly separated distinct button
const sep = document.createElement('div');
sep.className = 'map-card-separator';
strip.appendChild(sep);

const mapCard = document.createElement('div');
mapCard.className = 'map-card-btn';
mapCard.id = 'card-map';
mapCard.innerHTML = `
  <div class="map-card-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
      <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
    </svg>
  </div>
  <div class="map-card-label">Map View</div>
  <div class="map-card-sub" id="mcd-gps">GPS Track</div>
`;
mapCard.addEventListener('click', activateMap);
strip.appendChild(mapCard);

// ─── TIME-DOMAIN PANEL ──────────────────────────────────────────────────────
let activeField = null;
let windowSec   = 60;
let rafId       = null;

function buildChartPanel(field) {
  const m = METRICS.find(x => x.field === field);
  if (!m) return;
  const panel = document.getElementById('plotPanel');
  panel.className = 'plot-panel';
  panel.innerHTML = `
    <div class="plot-toolbar" style="--card-color:${m.color}">
      <span class="plot-name">${m.label}</span>
      <span class="plot-unit-badge">${m.unit}</span>
      <span class="plot-help">${m.help}</span>
      <div class="presets">
        <button class="preset" onclick="setWin(30,this)">30s</button>
        <button class="preset" onclick="setWin(60,this)">1m</button>
        <button class="preset" onclick="setWin(300,this)">5m</button>
        <button class="preset" onclick="setWin(600,this)">10m</button>
      </div>
      <div class="win-wrap">
        <input class="win-num" id="winNum" type="number" min="5" max="3600" value="${windowSec}">
        <span style="font-size:10px;font-weight:500;color:var(--muted)">s</span>
      </div>
    </div>
    <div class="canvas-wrap"><canvas id="plotCanvas"></canvas></div>
  `;
  document.getElementById('winNum').addEventListener('change', function() {
    const v = parseInt(this.value);
    if (v >= 5 && v <= 3600) { windowSec = v; document.querySelectorAll('.preset').forEach(b => b.classList.remove('on')); }
  });
  setWinHighlight(windowSec);
}

function activateMetric(field) {
  const m = METRICS.find(x => x.field === field);
  if (!m) return;

  stopLoop();
  clearMapPanel();
  activeField = field;

  document.querySelectorAll('.metric-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-map').classList.remove('active');
  document.getElementById('card-' + field).classList.add('active');

  const area = document.getElementById('mainArea');
  area.innerHTML = '';
  const pp = document.createElement('div');
  pp.id = 'plotPanel';
  pp.className = 'plot-panel';
  area.appendChild(pp);

  buildChartPanel(field);
  startLoop();
}

function setWin(sec, btn) {
  windowSec = sec;
  document.querySelectorAll('.preset').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  const wi = document.getElementById('winNum');
  if (wi) wi.value = sec;
}

function setWinHighlight(sec) {
  const map = { 30:'30s', 60:'1m', 300:'5m', 600:'10m' };
  document.querySelectorAll('.preset').forEach(b => b.classList.toggle('on', b.textContent === map[sec]));
}

// ─── CANVAS RENDERER ────────────────────────────────────────────────────────
const PAD = { t:12, b:24, l:48, r:12 };

function render() {
  const canvas = document.getElementById('plotCanvas');
  if (!canvas || !activeField) return;
  const m = METRICS.find(x => x.field === activeField);
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (!W || !H) return;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);
  const now = Date.now(), tStart = now - windowSec * 1000;
  const pts = history[activeField].filter(d => d.t >= tStart);
  const cX = PAD.l, cY = PAD.t, cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
  let yMin = m.yMin, yMax = m.yMax;
  if (pts.length > 1) {
    const vs = pts.map(d => d.v), lo = Math.min(...vs), hi = Math.max(...vs), pad = (hi - lo) * .12 || .5;
    yMin = Math.max(m.yMin, lo - pad); yMax = Math.min(m.yMax, hi + pad);
    if (yMin >= yMax) { yMin = m.yMin; yMax = m.yMax; }
  }
  const yRange = yMax - yMin || 1;
  const toX = t => cX + ((t - tStart) / (windowSec * 1000)) * cW;
  const toY = v => cY + cH - ((v - yMin) / yRange) * cH;
  const GRID = '#ffffff0a', AXIS = '#ffffff18', LABEL = '#7a8fa3', FONT = '10px Poppins,sans-serif';
  ctx.clearRect(0, 0, W, H); ctx.font = FONT;
  for (let i = 0; i <= 5; i++) {
    const v = yMin + (yRange / 5) * i, y = toY(v);
    ctx.strokeStyle = GRID; ctx.lineWidth = .5;
    ctx.beginPath(); ctx.moveTo(cX, y); ctx.lineTo(cX + cW, y); ctx.stroke();
    ctx.fillStyle = LABEL; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(v.toFixed(m.decimals <= 1 ? 1 : 2), cX - 6, y);
  }
  const xN = Math.max(2, Math.min(8, Math.floor(cW / 90)));
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let i = 0; i <= xN; i++) {
    const t = tStart + (i / xN) * windowSec * 1000, x = toX(t), s = Math.round((now - t) / 1000);
    ctx.fillStyle = LABEL; ctx.fillText(s === 0 ? 'now' : `-${s}s`, x, cY + cH + 6);
    ctx.strokeStyle = AXIS; ctx.lineWidth = .5;
    ctx.beginPath(); ctx.moveTo(x, cY + cH); ctx.lineTo(x, cY + cH + 3); ctx.stroke();
  }
  ctx.strokeStyle = AXIS; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(cX, cY + cH); ctx.lineTo(cX + cW, cY + cH); ctx.stroke();
  if (pts.length < 2) {
    ctx.fillStyle = LABEL; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = '11px Poppins,sans-serif';
    ctx.fillText('Waiting for data…', cX + cW / 2, cY + cH / 2); return;
  }
  ctx.save(); ctx.beginPath(); ctx.rect(cX, cY, cW, cH); ctx.clip();
  if (yMin < 0 && yMax > 0) {
    const z = toY(0); ctx.strokeStyle = m.color + '40'; ctx.lineWidth = 1; ctx.setLineDash([4, 5]);
    ctx.beginPath(); ctx.moveTo(cX, z); ctx.lineTo(cX + cW, z); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.beginPath(); ctx.moveTo(toX(pts[0].t), toY(pts[0].v));
  pts.slice(1).forEach(p => ctx.lineTo(toX(p.t), toY(p.v)));
  ctx.lineTo(toX(pts[pts.length-1].t), cY + cH); ctx.lineTo(toX(pts[0].t), cY + cH);
  ctx.closePath(); ctx.fillStyle = m.color + '14'; ctx.fill();
  ctx.beginPath(); ctx.moveTo(toX(pts[0].t), toY(pts[0].v));
  pts.slice(1).forEach(p => ctx.lineTo(toX(p.t), toY(p.v)));
  ctx.strokeStyle = m.color; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();
  const lp = pts[pts.length-1];
  ctx.beginPath(); ctx.arc(toX(lp.t), toY(lp.v), 3.5, 0, Math.PI*2);
  ctx.fillStyle = m.color; ctx.fill(); ctx.strokeStyle = '#0d1b2a'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();
}

function loop()      { render(); rafId = requestAnimationFrame(loop); }
function startLoop() { if (!rafId) rafId = requestAnimationFrame(loop); }
function stopLoop()  { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

// ─── MAP DRAWING ─────────────────────────────────────────────────────────────

// color ramp: green → gold → red (original palette)
function metricToColor(norm) {
  const r = norm < .5
    ? Math.round(76  + (201-76)  * norm * 2)
    : Math.round(201 + (224-201) * (norm-.5) * 2);
  const g = norm < .5
    ? Math.round(175 + (168-175) * norm * 2)
    : Math.round(168 + (92-168)  * (norm-.5) * 2);
  const b = norm < .5
    ? Math.round(61  + (76-61)   * norm * 2)
    : Math.round(76  + (74-76)   * (norm-.5) * 2);
  return `rgb(${r},${g},${b})`;
}

function drawMapTrace() {
  if (!leafletMap) return;

  // clear old layers
  mapPolylines.forEach(p => p.remove());
  mapPolylines = [];
  if (replayMarker) { replayMarker.remove(); replayMarker = null; }

  const n = gpsHistory.length;
  if (n < 2) {
    // show world view, wait for data
    leafletMap.setView([49.2827, -123.1207], 13);
    return;
  }

  // slice by range
  const iStart = Math.floor(mapRangeStart * (n - 1));
  const iEnd   = Math.ceil(mapRangeEnd   * (n - 1));
  const pts    = gpsHistory.slice(iStart, iEnd + 1);

  if (pts.length < 2) return;

  // get coloring metric values for this slice
  const mDef = METRICS.find(x => x.field === colorByField);
  const mHist = history[colorByField];

  // build per-segment polylines
  // each segment = pts[i] → pts[i+1], colored by metric value at pts[i].t
  let allVals = [];
  pts.forEach(p => {
    const nearest = nearestMetric(mHist, p.t);
    if (nearest !== null) allVals.push(nearest);
  });
  const vMin = allVals.length ? Math.min(...allVals) : 0;
  const vMax = allVals.length ? Math.max(...allVals) : 1;
  const vRange = vMax - vMin || 1;

  // update legend
  const legendLo = document.getElementById('legendLo');
  const legendHi = document.getElementById('legendHi');
  if (legendLo) legendLo.textContent = vMin.toFixed(mDef ? mDef.decimals : 1) + (mDef ? ' ' + mDef.unit : '');
  if (legendHi) legendHi.textContent = vMax.toFixed(mDef ? mDef.decimals : 1) + (mDef ? ' ' + mDef.unit : '');

  // Group consecutive points into runs of similar color (32 buckets),
  // then draw each run as a single smoothed polyline.
  const BUCKETS = 32;
  let runLatLngs = [[pts[0].lat, pts[0].lon]];
  let runBucket  = -1;

  const flushRun = (col) => {
    if (runLatLngs.length < 2) return;
    mapPolylines.push(
      L.polyline(runLatLngs, { color: col, weight: 4, opacity: 0.95,
        smoothFactor: 1.5, lineJoin:'round', lineCap:'round' })
       .addTo(leafletMap)
    );
  };

  let prevCol = null;
  for (let i = 0; i < pts.length - 1; i++) {
    const v      = nearestMetric(mHist, pts[i].t);
    const norm   = v !== null ? (v - vMin) / vRange : 0.5;
    const bucket = Math.round(norm * (BUCKETS - 1));
    const col    = metricToColor(norm);

    if (bucket !== runBucket) {
      flushRun(prevCol || col);
      // start new run, overlapping one point for continuity
      runLatLngs = runLatLngs.length > 0
        ? [runLatLngs[runLatLngs.length - 1], [pts[i].lat, pts[i].lon]]
        : [[pts[i].lat, pts[i].lon]];
      runBucket = bucket;
    } else {
      runLatLngs.push([pts[i].lat, pts[i].lon]);
    }
    prevCol = col;
  }
  // push last point and flush
  if (pts.length > 1) runLatLngs.push([pts[pts.length-1].lat, pts[pts.length-1].lon]);
  flushRun(prevCol || metricToColor(0.5));

  // fit map to trace only on first draw; subsequent scrubs keep current view
  if (!mapFitted) {
    const bounds = L.latLngBounds(pts.map(p => [p.lat, p.lon]));
    leafletMap.fitBounds(bounds, { padding:[24,24] });
    mapFitted = true;
  }

  // start marker
  updateScrubInfo(iStart, iEnd, n);
}

function nearestMetric(hist, t) {
  if (!hist || !hist.length) return null;
  let lo = 0, hi = hist.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (hist[mid].t < t) lo = mid + 1; else hi = mid;
  }
  return hist[lo] ? hist[lo].v : null;
}

function setColorBy(field) {
  colorByField = field;
  drawMapTrace();
}

// fmt: timestamp → "HH:MM:SS" for <input type="time">
function tsToTimeStr(t) {
  const d = new Date(t);
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0') + ':' +
         d.getSeconds().toString().padStart(2,'0');
}

// parse "HH:MM:SS" back to today's timestamp
function timeStrToTs(str, refDate) {
  const [h,m,s] = str.split(':').map(Number);
  const d = new Date(refDate);
  d.setHours(h, m, s, 0);
  return d.getTime();
}

function onScrub(which) {
  const sEl = document.getElementById('scrubStart');
  const eEl = document.getElementById('scrubEnd');
  let s = parseInt(sEl.value), e = parseInt(eEl.value);
  if (s > e) {
    if (which === 'start') sEl.value = e, s = e;
    else                   eEl.value = s, e = s;
  }
  mapRangeStart = s / 1000;
  mapRangeEnd   = e / 1000;
  syncTimeInputs();
  stopReplay();
  drawMapTrace();
}

function onTimeInput(which) {
  const n = gpsHistory.length;
  if (n < 2) return;
  const tFirst = gpsHistory[0].t, tLast = gpsHistory[n-1].t;
  const ref = new Date(tFirst);

  const tsStart = timeStrToTs(document.getElementById('timeStart').value, ref);
  const tsEnd   = timeStrToTs(document.getElementById('timeEnd').value,   ref);

  // clamp to data range
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  let fracS = (clamp(tsStart, tFirst, tLast) - tFirst) / (tLast - tFirst);
  let fracE = (clamp(tsEnd,   tFirst, tLast) - tFirst) / (tLast - tFirst);
  if (which === 'start' && fracS > fracE) fracS = fracE;
  if (which === 'end'   && fracE < fracS) fracE = fracS;

  mapRangeStart = fracS;
  mapRangeEnd   = fracE;

  document.getElementById('scrubStart').value = Math.round(fracS * 1000);
  document.getElementById('scrubEnd').value   = Math.round(fracE * 1000);

  stopReplay();
  drawMapTrace();
}

function syncTimeInputs() {
  const n = gpsHistory.length;
  if (n < 2) return;
  const tFirst = gpsHistory[0].t, tLast = gpsHistory[n-1].t;
  const tS = tFirst + mapRangeStart * (tLast - tFirst);
  const tE = tFirst + mapRangeEnd   * (tLast - tFirst);
  const tsEl = document.getElementById('timeStart');
  const teEl = document.getElementById('timeEnd');
  if (tsEl) tsEl.value = tsToTimeStr(tS);
  if (teEl) teEl.value = tsToTimeStr(tE);
}

function updateScrubInfo(iStart, iEnd, n) {
  if (n < 2) return;
  syncTimeInputs();
}

// ─── REPLAY ──────────────────────────────────────────────────────────────────
function toggleReplay() {
  if (isPlaying) stopReplay();
  else startReplay();
}

function startReplay() {
  if (!leafletMap || gpsHistory.length < 2) return;
  isPlaying = true;
  const btn = document.getElementById('replayBtn');
  if (btn) btn.classList.add('playing'), btn.textContent = '⏸ Pause';

  const n      = gpsHistory.length;
  const iStart = Math.floor(mapRangeStart * (n - 1));
  const iEnd   = Math.ceil(mapRangeEnd   * (n - 1));
  const pts    = gpsHistory.slice(iStart, iEnd + 1);
  if (pts.length < 2) { stopReplay(); return; }

  replayIdx = 0;

  // car marker
  if (replayMarker) replayMarker.remove();
  const carIcon = L.divIcon({
    className: '',
    html: `<div style="
      width:12px;height:12px;border-radius:50%;
      background:#c9a84c;border:2px solid #fff;
      box-shadow:0 0 6px #c9a84c88;
    "></div>`,
    iconSize: [12, 12], iconAnchor: [6, 6],
  });
  replayMarker = L.marker([pts[0].lat, pts[0].lon], { icon:carIcon, zIndexOffset:1000 }).addTo(leafletMap);

  function step() {
    if (!isPlaying) return;
    replayIdx++;
    if (replayIdx >= pts.length) { stopReplay(); return; }
    replayMarker.setLatLng([pts[replayIdx].lat, pts[replayIdx].lon]);

    // interval based on actual time delta, divided by speed multiplier
    const speedMul = parseFloat(document.getElementById('replaySpeed')?.value || 10);
    const dtReal   = replayIdx < pts.length - 1
      ? pts[replayIdx + 1].t - pts[replayIdx].t
      : 500;
    const dtFast   = Math.max(16, dtReal / speedMul);
    replayTimer = setTimeout(step, dtFast);
  }

  replayTimer = setTimeout(step, 100);
}

function stopReplay() {
  isPlaying = false;
  clearTimeout(replayTimer); replayTimer = null;
  const btn = document.getElementById('replayBtn');
  if (btn) btn.classList.remove('playing'), btn.textContent = '▶ Replay';
}

// ─── DATA ────────────────────────────────────────────────────────────────────
function push(field, t, raw) {
  const m = METRICS.find(x => x.field === field);
  if (!m) return;
  const v = m.transform ? m.transform(raw) : raw;
  const h = history[field];
  h.push({ t, v });
  const cut = Date.now() - MAX_MS;
  while (h.length && h[0].t < cut) h.shift();

  const lat_ = latest[field];
  lat_.prev = lat_.value; lat_.value = v;

  const valEl = document.getElementById('mcv-' + field);
  if (valEl) { valEl.classList.remove('no-data'); valEl.textContent = v.toFixed(m.decimals); }

  const barEl = document.getElementById('mcb-' + field);
  if (barEl) {
    const pct = ((v - m.yMin) / (m.yMax - m.yMin)) * 100;
    barEl.style.width = Math.min(100, Math.max(0, pct)).toFixed(1) + '%';
  }

  const dEl = document.getElementById('mcd-' + field);
  if (dEl && lat_.prev !== null) {
    const diff = v - lat_.prev;
    dEl.className = 'mc-delta ' + (diff > 0 ? 'delta-up' : diff < 0 ? 'delta-dn' : '');
    dEl.textContent = (diff > 0 ? '▲ +' : diff < 0 ? '▼ ' : '') + Math.abs(diff).toFixed(m.decimals) + ' ' + m.unit;
  }
}

function pushGPS(t, lat, lon) {
  gpsHistory.push({ t, lat, lon });
  const cut = Date.now() - MAX_MS;
  while (gpsHistory.length && gpsHistory[0].t < cut) gpsHistory.shift();

  // update map card sub-label
  const dEl = document.getElementById('mcd-gps');
  if (dEl) dEl.textContent = gpsHistory.length + ' pts';

  // if map panel is active, incrementally add the new segment
  if (leafletMap && gpsHistory.length >= 2 && !isPlaying) {
    const n  = gpsHistory.length;
    const i  = n - 2; // second-to-last
    const iS = Math.floor(mapRangeStart * (n - 1));
    const iE = Math.ceil(mapRangeEnd   * (n - 1));
    if (i >= iS && i < iE) {
      // only redraw periodically to avoid per-frame full redraw
      if (n % 5 === 0) drawMapTrace();
    }
  }
}

function ingest(data) {
  const now = Date.now();
  METRICS.forEach(m => { if (data[m.field] !== undefined) push(m.field, now, data[m.field]); });
  // GPS
  if (data.lat !== undefined && data.lon !== undefined) {
    pushGPS(data.timestamp || now, data.lat, data.lon);
  }
}

let wpIdx = 0;
const ds = { motor_power:2800, array_power:1600, battery_soc:84, speed:58, steering_angle:0, acceleration:0.1 };

function dummyTick() {
  const w = (v, s, lo, hi) => Math.min(hi, Math.max(lo, v + (Math.random() - .5) * s));
  ds.motor_power    = w(ds.motor_power,    200,  0,    5000);
  ds.array_power    = w(ds.array_power,    100,  0,    3000);
  ds.battery_soc    = w(ds.battery_soc,    .05,  0,    100);
  ds.speed          = w(ds.speed,          3,    0,    100);
  ds.steering_angle = w(ds.steering_angle, 3,   -40,   40);
  ds.acceleration   = w(ds.acceleration,   .08, -.8,    .8);

  const pt = WAYPOINTS[wpIdx % WAYPOINTS.length];
  wpIdx++;

  const now = Date.now();
  pushGPS(now, pt[0], pt[1]);
  push('speed',          now, ds.speed);
  push('motor_power',    now, ds.motor_power);
  push('array_power',    now, ds.array_power);
  push('battery_soc',    now, ds.battery_soc);
  push('steering_angle', now, ds.steering_angle);
  push('acceleration',   now, ds.acceleration);
}

setInterval(dummyTick, 500);
window.addEventListener('resize', () => { if (activeField) render(); if (leafletMap) leafletMap.invalidateSize(); });
