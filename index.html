<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBC Solar · Telemetry</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --navy:      #0d1b2a;
  --navy2:     #162232;
  --navy3:     #1e2e40;
  --gold:      #c9a84c;
  --gold-dim:  #8a6e2e;
  --gold-bg:   #c9a84c18;
  --text:      #f0f4f8;
  --muted:     #7a8fa3;
  --border:    #ffffff12;
  --border2:   #ffffff20;
  --green:     #4caf7d;
  --red:       #e05c4a;
  --font:      'Poppins', sans-serif;
}

html, body {
  height: 100%;
  background: var(--navy);
  color: var(--text);
  font-family: var(--font);
  font-size: 12px;
  overflow: hidden;
}

.shell {
  display: grid;
  grid-template-rows: 48px auto 1fr;
  height: 100vh;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  background: var(--navy2);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: 15px;
  font-weight: 700;
  color: var(--gold);
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.logo span { color: var(--text); font-weight: 500; }

input[type=number] {
  background: var(--navy3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font);
  font-size: 11px;
  padding: 4px 9px;
  outline: none;
  transition: border-color .15s;
}
input[type=number]:focus { border-color: var(--gold); }

/* ── CARD STRIP ── */
.card-strip {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--navy2);
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.card-strip::-webkit-scrollbar { display: none; }

.metric-card {
  flex: 1 0 150px;
  padding: 11px 16px 10px;
  border-right: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  user-select: none;
  transition: background .15s;
}
.metric-card:last-child { border-right: none; }
.metric-card:hover      { background: var(--navy3); }
.metric-card.active     { background: var(--navy3); }

.metric-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--card-color, var(--gold));
  opacity: 0.3;
  transition: opacity .2s;
}
.metric-card:hover::before,
.metric-card.active::before { opacity: 0.9; }

.metric-card::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 2px;
  background: var(--card-color, var(--gold));
  transform: scaleX(0);
  transition: transform .2s ease;
}
.metric-card.active::after { transform: scaleX(1); }

.mc-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.02em;
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.mc-value-row { display: flex; align-items: baseline; gap: 4px; }

.mc-value {
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  color: var(--card-color, var(--text));
  white-space: nowrap;
  transition: color .3s;
}
.mc-value.no-data { font-size: 20px; color: var(--muted); font-weight: 400; }

.mc-unit { font-size: 11px; color: var(--muted); font-weight: 400; }

.mc-bar-track {
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  margin-top: 8px;
  overflow: hidden;
}
.mc-bar-fill {
  height: 100%;
  border-radius: 1px;
  background: var(--card-color, var(--gold));
  transition: width .8s cubic-bezier(.4,0,.2,1);
  opacity: 0.5;
}

.mc-delta {
  font-size: 10px;
  font-weight: 500;
  margin-top: 4px;
  color: var(--muted);
  transition: color .4s;
}
.delta-up { color: var(--green); }
.delta-dn { color: var(--red); }

/* ── PLOT PANEL ── */
.plot-panel {
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

.plot-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.plot-empty-hint {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
}

.plot-toolbar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--navy2);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.plot-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--card-color, var(--text));
}
.plot-unit-badge {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 1px 6px;
}

.plot-help {
  font-size: 10px;
  font-weight: 400;
  color: var(--muted);
  line-height: 1.5;
  border-left: 2px solid var(--gold-dim);
  padding-left: 8px;
  max-width: 360px;
  flex: 1;
}

.presets { display: flex; gap: 4px; }
.preset {
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--muted);
  font-family: var(--font);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  cursor: pointer;
  transition: color .15s, border-color .15s, background .15s;
}
.preset:hover { color: var(--text); border-color: var(--gold-dim); }
.preset.on    { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-bg); }

.win-wrap { display: flex; align-items: center; gap: 5px; }
.win-num  { width: 52px; text-align: right; }

.canvas-wrap { flex: 1; position: relative; min-height: 0; }
#plotCanvas  { position: absolute; inset: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">UBC <span>Solar</span></div>
  </header>

  <div class="card-strip" id="cardStrip"></div>

  <div class="plot-panel" id="plotPanel">
    <div class="plot-empty">
      <div class="plot-empty-hint">Select a metric above to view its time-domain plot</div>
    </div>
  </div>

</div>
<script>
// ─── METRICS ───────────────────────────────────────────────────────────────
const METRICS = [
  { field:'motor_power',    label:'Motor Power',    unit:'kW', color:'#e05c4a',
    transform:v=>v/1000, decimals:2, yMin:0,   yMax:5,
    help:'Electrical power drawn by the motor controller. High values indicate acceleration or hill climbing. Compare with array power to track net energy balance.' },
  { field:'array_power',    label:'Array Power',    unit:'kW', color:'#c9a84c',
    transform:v=>v/1000, decimals:2, yMin:0,   yMax:3,
    help:'Solar panel output. Peaks in direct sunlight; drops in shade or cloud cover. A sustained mid-race drop may mean panel shading by another vehicle.' },
  { field:'battery_soc',    label:'Battery SOC',    unit:'%',  color:'#4caf7d',
    decimals:1, yMin:0, yMax:100,
    help:'State of charge of the battery pack. A steady decline indicates net energy consumption. Use to pace energy strategy across the race.' },
  { field:'speed',          label:'Speed',          unit:'km/h', color:'#60a5fa',
    decimals:1, yMin:0, yMax:100,
    help:'Vehicle speed. Compare with motor power to spot inefficient phases — high power with low speed gain suggests drag or headwind.' },
  { field:'steering_angle', label:'Steering Angle', unit:'°',  color:'#34d399',
    decimals:1, yMin:-45, yMax:45,
    help:'Steering wheel deflection in degrees. Large sustained angles indicate lane corrections which increase rolling resistance. Smoother profiles save energy.' },
  { field:'acceleration',   label:'Acceleration',   unit:'g',  color:'#a78bfa',
    decimals:2, yMin:-1, yMax:1,
    help:'Longitudinal acceleration. Positive = accelerating, negative = braking. Smooth gradual profiles minimise energy loss through kinetic waste.' },
];

const MAX_MS = 3600 * 1000;
const history = {};
const latest  = {};
METRICS.forEach(m => { history[m.field] = []; latest[m.field] = { value:null, prev:null }; });

// ─── BUILD CARD STRIP ──────────────────────────────────────────────────────
const strip = document.getElementById('cardStrip');
METRICS.forEach(m => {
  const card = document.createElement('div');
  card.className = 'metric-card';
  card.id = 'card-' + m.field;
  card.style.setProperty('--card-color', m.color);
  card.innerHTML = `
    <div class="mc-label">${m.label}</div>
    <div class="mc-value-row">
      <div class="mc-value no-data" id="mcv-${m.field}">—</div>
      <div class="mc-unit">${m.unit}</div>
    </div>
    <div class="mc-bar-track"><div class="mc-bar-fill" id="mcb-${m.field}" style="width:0%"></div></div>
    <div class="mc-delta" id="mcd-${m.field}"></div>
  `;
  card.addEventListener('click', () => activateMetric(m.field));
  strip.appendChild(card);
});

// ─── PLOT PANEL ────────────────────────────────────────────────────────────
let activeField = null;
let windowSec   = 60;
let rafId       = null;

function activateMetric(field) {
  const m = METRICS.find(x => x.field === field);
  if (!m) return;

  document.querySelectorAll('.metric-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + field);
  if (card) card.classList.add('active');

  activeField = field;

  const panel = document.getElementById('plotPanel');
  panel.innerHTML = `
    <div class="plot-toolbar" style="--card-color:${m.color}">
      <span class="plot-name">${m.label}</span>
      <span class="plot-unit-badge">${m.unit}</span>
      <span class="plot-help">${m.help}</span>
      <div class="presets" id="presets">
        <button class="preset" onclick="setWin(30,this)">30s</button>
        <button class="preset" onclick="setWin(60,this)">1m</button>
        <button class="preset" onclick="setWin(300,this)">5m</button>
        <button class="preset" onclick="setWin(600,this)">10m</button>
      </div>
      <div class="win-wrap">
        <input class="win-num" id="winNum" type="number" min="5" max="3600" value="${windowSec}">
        <span style="font-size:10px;font-weight:500;color:var(--muted)">s</span>
      </div>
    </div>
    <div class="canvas-wrap"><canvas id="plotCanvas"></canvas></div>
  `;

  document.getElementById('winNum').addEventListener('change', function() {
    const v = parseInt(this.value);
    if (v >= 5 && v <= 3600) {
      windowSec = v;
      document.querySelectorAll('.preset').forEach(b => b.classList.remove('on'));
    }
  });

  setWinHighlight(windowSec);
  startLoop();
}

function setWin(sec, btn) {
  windowSec = sec;
  document.querySelectorAll('.preset').forEach(b => b.classList.remove('on'));
  if (btn) btn.classList.add('on');
  const wi = document.getElementById('winNum');
  if (wi) wi.value = sec;
}

function setWinHighlight(sec) {
  const map = { 30:'30s', 60:'1m', 300:'5m', 600:'10m' };
  const label = map[sec];
  document.querySelectorAll('.preset').forEach(b => {
    b.classList.toggle('on', b.textContent === label);
  });
}

// ─── RENDERER ──────────────────────────────────────────────────────────────
const PAD = { t:12, b:24, l:48, r:12 };

function render() {
  const canvas = document.getElementById('plotCanvas');
  if (!canvas || !activeField) return;
  const m = METRICS.find(x => x.field === activeField);
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (!W || !H) return;

  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const now    = Date.now();
  const tStart = now - windowSec * 1000;
  const pts    = history[activeField].filter(d => d.t >= tStart);

  const cX = PAD.l, cY = PAD.t;
  const cW = W - PAD.l - PAD.r;
  const cH = H - PAD.t - PAD.b;

  let yMin = m.yMin, yMax = m.yMax;
  if (pts.length > 1) {
    const vs  = pts.map(d => d.v);
    const lo  = Math.min(...vs), hi = Math.max(...vs);
    const pad = (hi - lo) * 0.12 || 0.5;
    yMin = Math.max(m.yMin, lo - pad);
    yMax = Math.min(m.yMax, hi + pad);
    if (yMin >= yMax) { yMin = m.yMin; yMax = m.yMax; }
  }
  const yRange = yMax - yMin || 1;
  const toX = t => cX + ((t - tStart) / (windowSec * 1000)) * cW;
  const toY = v => cY + cH - ((v - yMin) / yRange) * cH;

  const GRID  = '#ffffff0a';
  const AXIS  = '#ffffff18';
  const LABEL = '#7a8fa3';
  const FONT  = '10px Poppins, sans-serif';

  ctx.clearRect(0, 0, W, H);
  ctx.font = FONT;

  // y grid + labels
  for (let i = 0; i <= 5; i++) {
    const v = yMin + (yRange / 5) * i;
    const y = toY(v);
    ctx.strokeStyle = GRID; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(cX, y); ctx.lineTo(cX + cW, y); ctx.stroke();
    ctx.fillStyle = LABEL; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText(v.toFixed(m.decimals <= 1 ? 1 : 2), cX - 6, y);
  }

  // x labels
  const xN = Math.max(2, Math.min(8, Math.floor(cW / 90)));
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let i = 0; i <= xN; i++) {
    const t = tStart + (i / xN) * windowSec * 1000;
    const x = toX(t);
    const s = Math.round((now - t) / 1000);
    ctx.fillStyle = LABEL;
    ctx.fillText(s === 0 ? 'now' : `-${s}s`, x, cY + cH + 6);
    ctx.strokeStyle = AXIS; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, cY + cH); ctx.lineTo(x, cY + cH + 3); ctx.stroke();
  }

  // axes
  ctx.strokeStyle = AXIS; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(cX, cY + cH); ctx.lineTo(cX + cW, cY + cH); ctx.stroke();

  if (pts.length < 2) {
    ctx.fillStyle = LABEL; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = '11px Poppins, sans-serif';
    ctx.fillText('Waiting for data…', cX + cW / 2, cY + cH / 2);
    return;
  }

  ctx.save();
  ctx.beginPath(); ctx.rect(cX, cY, cW, cH); ctx.clip();

  // zero line
  if (yMin < 0 && yMax > 0) {
    const z = toY(0);
    ctx.strokeStyle = m.color + '40'; ctx.lineWidth = 1; ctx.setLineDash([4, 5]);
    ctx.beginPath(); ctx.moveTo(cX, z); ctx.lineTo(cX + cW, z); ctx.stroke();
    ctx.setLineDash([]);
  }

  // fill under line
  ctx.beginPath();
  ctx.moveTo(toX(pts[0].t), toY(pts[0].v));
  pts.slice(1).forEach(p => ctx.lineTo(toX(p.t), toY(p.v)));
  ctx.lineTo(toX(pts[pts.length - 1].t), cY + cH);
  ctx.lineTo(toX(pts[0].t), cY + cH);
  ctx.closePath();
  ctx.fillStyle = m.color + '14';
  ctx.fill();

  // line
  ctx.beginPath();
  ctx.moveTo(toX(pts[0].t), toY(pts[0].v));
  pts.slice(1).forEach(p => ctx.lineTo(toX(p.t), toY(p.v)));
  ctx.strokeStyle = m.color; ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  ctx.stroke();

  // latest dot
  const lp = pts[pts.length - 1];
  ctx.beginPath(); ctx.arc(toX(lp.t), toY(lp.v), 3.5, 0, Math.PI * 2);
  ctx.fillStyle = m.color; ctx.fill();
  ctx.strokeStyle = '#0d1b2a'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.restore();
}

function loop()      { render(); rafId = requestAnimationFrame(loop); }
function startLoop() { if (!rafId) rafId = requestAnimationFrame(loop); }
function stopLoop()  { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

// ─── DATA ──────────────────────────────────────────────────────────────────
function push(field, t, raw) {
  const m = METRICS.find(x => x.field === field);
  if (!m) return;
  const v = m.transform ? m.transform(raw) : raw;
  const h = history[field];
  h.push({ t, v });
  const cut = Date.now() - MAX_MS;
  while (h.length && h[0].t < cut) h.shift();

  const L = latest[field];
  L.prev  = L.value;
  L.value = v;

  // plain text swap — no animation class
  const valEl = document.getElementById('mcv-' + field);
  if (valEl) {
    valEl.classList.remove('no-data');
    valEl.textContent = v.toFixed(m.decimals);
  }

  // bar — CSS transition handles smooth movement
  const barEl = document.getElementById('mcb-' + field);
  if (barEl) {
    const pct = ((v - m.yMin) / (m.yMax - m.yMin)) * 100;
    barEl.style.width = Math.min(100, Math.max(0, pct)).toFixed(1) + '%';
  }

  // delta
  const dEl = document.getElementById('mcd-' + field);
  if (dEl && L.prev !== null) {
    const diff = v - L.prev;
    const sign = diff > 0 ? '▲ +' : diff < 0 ? '▼ ' : '';
    const cls  = diff > 0 ? 'delta-up' : diff < 0 ? 'delta-dn' : '';
    dEl.className = 'mc-delta ' + cls;
    dEl.textContent = sign + Math.abs(diff).toFixed(m.decimals) + ' ' + m.unit;
  }
}

function ingest(data) {
  const now = Date.now();
  METRICS.forEach(m => { if (data[m.field] !== undefined) push(m.field, now, data[m.field]); });
}

// ─── DUMMY DATA (auto-starts) ───────────────────────────────────────────────
const ds = { motor_power:2800, array_power:1600, battery_soc:84, speed:58, steering_angle:0, acceleration:0.1 };

function dummyTick() {
  const w = (v, s, lo, hi) => Math.min(hi, Math.max(lo, v + (Math.random() - .5) * s));
  ds.motor_power    = w(ds.motor_power,    200,  0,    5000);
  ds.array_power    = w(ds.array_power,    100,  0,    3000);
  ds.battery_soc    = w(ds.battery_soc,    0.05, 0,    100);
  ds.speed          = w(ds.speed,          3,    0,    100);
  ds.steering_angle = w(ds.steering_angle, 3,   -40,   40);
  ds.acceleration   = w(ds.acceleration,   0.08, -0.8,  0.8);
  ingest(ds);
}

setInterval(dummyTick, 500);

window.addEventListener('resize', render);
</script>
</body>
</html>
