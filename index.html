<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBC Solar · Telemetry</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --navy:     #0d1b2a;
  --navy2:    #162232;
  --navy3:    #1e2e40;
  --navy4:    #253548;
  --gold:     #c9a84c;
  --gold-dim: #8a6e2e;
  --gold-bg:  #c9a84c18;
  --text:     #f0f4f8;
  --muted:    #7a8fa3;
  --border:   #ffffff12;
  --border2:  #ffffff20;
  --green:    #4caf7d;
  --red:      #e05c4a;
  --font:     'Poppins', sans-serif;
  --sidebar-w: 240px;
}

html, body { height:100%; background:var(--navy); color:var(--text); font-family:var(--font); font-size:14px; overflow:hidden; }

.shell { display:flex; flex-direction:column; height:100vh; }

/* ── HEADER ── */
header { display:flex; align-items:center; gap:12px; padding:0 16px; height:36px; background:var(--navy2); border-bottom:1px solid var(--border); flex-shrink:0; z-index:10; }
.logo { font-size:14px; font-weight:700; color:var(--gold); white-space:nowrap; letter-spacing:.01em; }
.logo span { color:var(--text); font-weight:500; }

/* ── TOP TABS ── */
.top-tabs { display:flex; align-items:stretch; gap:0; margin-left:12px; height:100%; }
.top-tab {
  background:transparent; border:none; border-bottom:2px solid transparent;
  color:var(--muted); font-family:var(--font); font-size:12px; font-weight:600;
  padding:0 14px; cursor:pointer; letter-spacing:.04em; text-transform:uppercase;
  transition:color .15s, border-color .15s;
}
.top-tab:hover { color:var(--text); }
.top-tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* ── SEARCH ── */
.header-search {
  margin-left:auto; position:relative; display:flex; align-items:center;
}
.header-search input {
  background:var(--navy3); border:1px solid var(--border2); border-radius:5px;
  color:var(--text); font-family:var(--font); font-size:12px;
  padding:4px 8px 4px 28px; width:180px; outline:none;
  transition:border-color .15s, width .2s;
}
.header-search input:focus { border-color:var(--gold); width:220px; }
.header-search input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:8px; color:var(--muted); pointer-events:none; }

/* ── BODY LAYOUT ── */
.body-layout { display:flex; flex:1; min-height:0; overflow:hidden; position:relative; }

/* ── SIDEBAR ── */
#sidebar {
  width:var(--sidebar-w); flex-shrink:0;
  background:var(--navy2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
  transition:width .25s cubic-bezier(.4,0,.2,1);
}
#sidebar.collapsed { width:0; border-right:none; }
#sidebar.hidden { display:none; }

.sidebar-inner { width:var(--sidebar-w); display:flex; flex-direction:column; height:100%; overflow:hidden; }

.sidebar-scroll { flex:1; overflow-y:auto; overflow-x:hidden; }
.sidebar-scroll::-webkit-scrollbar { width:4px; }
.sidebar-scroll::-webkit-scrollbar-track { background:transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── STAGE GROUPS ── */
.stage-group { border-bottom:1px solid var(--border); }
.stage-header {
  display:flex; align-items:center; gap:8px;
  padding:8px 12px 8px 10px;
  cursor:pointer; user-select:none;
  transition:background .12s;
  position:sticky; top:0; z-index:1;
  background:var(--navy2);
}
.stage-header:hover { background:var(--navy3); }
.stage-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.stage-name { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); flex:1; }
.stage-count { font-size:10px; color:var(--muted); background:var(--navy3); border-radius:8px; padding:1px 6px; flex-shrink:0; }
.stage-chevron { color:var(--muted); transition:transform .2s; flex-shrink:0; }
.stage-group.open .stage-chevron { transform:rotate(90deg); }
.stage-signals { display:none; }
.stage-group.open .stage-signals { display:block; }

/* ── SIGNAL ROWS ── */
.signal-row {
  display:flex; align-items:center; gap:0;
  padding:6px 12px 6px 25px;
  cursor:pointer; position:relative;
  transition:background .1s;
  border-left:2px solid transparent;
}
.signal-row:hover { background:var(--navy3); }
.signal-row.active { background:var(--navy3); border-left-color:var(--stage-color,var(--gold)); }
.signal-row.active .sig-name { color:var(--stage-color,var(--gold)); }
.signal-row.hidden-search { display:none; }

.sig-name { font-size:12px; font-weight:500; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sig-value { font-size:11px; font-weight:600; color:var(--stage-color,var(--muted)); white-space:nowrap; margin-left:6px; min-width:44px; text-align:right; }
.sig-unit { font-size:10px; color:var(--muted); margin-left:2px; }
.sig-badge { font-size:9px; font-weight:700; letter-spacing:.03em; color:var(--muted); background:var(--navy4); border-radius:3px; padding:1px 4px; margin-left:4px; flex-shrink:0; }

/* ── VITALS STRIP (always-on bar at sidebar bottom) ── */
.vitals-strip {
  flex-shrink:0; border-top:1px solid var(--border);
  background:var(--navy); padding:8px 10px 6px;
}
.vitals-title { font-size:9px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gold-dim); margin-bottom:6px; }
.vitals-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.vital-cell { background:var(--navy2); border-radius:4px; padding:5px 8px; }
.vital-label { font-size:9px; color:var(--muted); font-weight:500; margin-bottom:2px; }
.vital-value { font-size:15px; font-weight:700; color:var(--text); line-height:1; }
.vital-unit { font-size:9px; color:var(--muted); }

/* ── MAP BUTTON (sidebar) ── */
.sidebar-map-btn {
  display:flex; align-items:center; gap:8px;
  padding:9px 12px 9px 12px;
  cursor:pointer; user-select:none;
  border-top:1px solid var(--border);
  background:var(--navy2);
  transition:background .12s;
  flex-shrink:0;
}
.sidebar-map-btn:hover { background:var(--navy3); }
.sidebar-map-btn.active { background:rgba(96,165,250,0.12); }
.sidebar-map-icon {
  width:24px; height:24px; display:flex; align-items:center; justify-content:center;
  background:rgba(96,165,250,0.12); border-radius:5px; border:1px solid rgba(96,165,250,0.2); flex-shrink:0;
}
.sidebar-map-btn.active .sidebar-map-icon { background:rgba(96,165,250,0.22); border-color:rgba(96,165,250,0.5); }
.sidebar-map-label { font-size:11px; font-weight:700; color:#60a5fa; letter-spacing:.06em; text-transform:uppercase; }
.sidebar-map-sub { font-size:10px; color:var(--muted); margin-top:1px; }

/* ── SIDEBAR TOGGLE BUTTON ── */
#sidebarToggle {
  position:absolute; left:calc(var(--sidebar-w) - 1px); top:50%; transform:translateY(-50%);
  width:16px; height:40px; display:flex; align-items:center; justify-content:center;
  background:var(--navy3); border:1px solid var(--border2); border-left:none;
  border-radius:0 4px 4px 0; cursor:pointer; z-index:20; transition:left .25s;
  color:var(--muted); flex-shrink:0;
}
#sidebarToggle:hover { color:var(--text); background:var(--navy4); }
#sidebarToggle.hidden { display:none; }
.sidebar-collapsed #sidebarToggle { left:0; }

/* ── MAIN CONTENT ── */
#mainContent {
  flex:1; min-width:0; min-height:0; display:flex; flex-direction:column;
}

/* tabs for calc */
#dataTab { display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; }
#dataTab.hidden { display:none; }
#calcTab { display:none; flex-direction:column; flex:1; min-height:0; overflow:hidden; }
#calcTab.active { display:flex; }
#mainArea { display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; }

/* ── PANEL ── */
.plot-panel { display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; }
.plot-empty { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:8px; }
.plot-empty-hint { font-size:14px; font-weight:500; color:var(--muted); text-align:center; }
.plot-empty-sub { font-size:11px; color:var(--gold-dim); }

/* shared toolbar */
.plot-toolbar {
  display:flex; align-items:center; gap:14px; padding:8px 16px;
  border-bottom:1px solid var(--border); background:var(--navy2);
  flex-shrink:0; flex-wrap:wrap;
}
.plot-name { font-size:15px; font-weight:700; color:var(--card-color,var(--text)); }
.plot-unit-badge { font-size:12px; font-weight:500; color:var(--muted); border:1px solid var(--border2); border-radius:4px; padding:2px 8px; }
.plot-help { font-size:12px; color:var(--muted); line-height:1.5; border-left:2px solid var(--gold-dim); padding-left:10px; max-width:340px; flex:1; }

/* time-domain controls */
.presets { display:flex; gap:5px; }
.preset { background:transparent; border:1px solid var(--border2); border-radius:4px; color:var(--muted); font-family:var(--font); font-size:12px; font-weight:500; padding:4px 10px; cursor:pointer; transition:color .15s,border-color .15s,background .15s; }
.preset:hover { color:var(--text); border-color:var(--gold-dim); }
.preset.on { color:var(--gold); border-color:var(--gold-dim); background:var(--gold-bg); }
.win-wrap { display:flex; align-items:center; gap:5px; }
.win-num { width:58px; text-align:right; background:var(--navy3); border:1px solid var(--border2); border-radius:4px; color:var(--text); font-family:var(--font); font-size:13px; padding:4px 8px; outline:none; }
.win-num:focus { border-color:var(--gold); }

/* canvas */
.canvas-wrap { flex:1; position:relative; min-height:0; }
#plotCanvas { position:absolute; inset:0; width:100%; height:100%; }

/* ── STATIC MODE CONTROLS ── */
.mode-toggle {
  display:flex; align-items:center; gap:0; border:1px solid var(--border2); border-radius:5px; overflow:hidden; flex-shrink:0;
}
.mode-btn {
  background:transparent; border:none; color:var(--muted); font-family:var(--font);
  font-size:11px; font-weight:600; padding:4px 11px; cursor:pointer; letter-spacing:.03em;
  transition:background .15s, color .15s; white-space:nowrap;
}
.mode-btn.on { background:var(--gold-bg); color:var(--gold); }
.mode-btn:not(.on):hover { color:var(--text); background:rgba(255,255,255,.05); }
.mode-divider { width:1px; background:var(--border2); align-self:stretch; }

.static-inputs {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.static-inputs.hidden { display:none; }
.ts-label { font-size:11px; font-weight:500; color:var(--muted); white-space:nowrap; }
.ts-input {
  background:var(--navy3); border:1px solid var(--border2); border-radius:4px;
  color:var(--text); font-family:var(--font); font-size:11px; padding:3px 7px;
  outline:none; width:148px;
}
.ts-input:focus { border-color:var(--gold); }
.ts-apply {
  background:transparent; border:1px solid var(--border2); border-radius:4px;
  color:var(--muted); font-family:var(--font); font-size:11px; font-weight:600;
  padding:3px 10px; cursor:pointer; white-space:nowrap;
  transition:color .15s, border-color .15s, background .15s;
}
.ts-apply:hover { color:var(--gold); border-color:var(--gold-dim); background:var(--gold-bg); }

/* ── CUSTOM DATETIME PICKER ── */
.dt-picker {
  display:inline-flex; align-items:center;
  background:var(--navy3); border:1px solid var(--border2); border-radius:5px;
  padding:0 4px; gap:0; transition:border-color .15s; flex-shrink:0;
}
.dt-picker:focus-within { border-color:var(--gold); }
.dt-seg {
  font-family:var(--font); font-size:13px; font-weight:500; color:var(--text);
  background:transparent; border:none; outline:none;
  text-align:center; cursor:ns-resize; user-select:none;
  padding:5px 2px; border-radius:3px;
  transition:background .12s, color .12s;
  -moz-appearance:textfield;
}
.dt-seg:focus { background:var(--gold-bg); color:var(--gold); }
.dt-seg::-webkit-inner-spin-button,
.dt-seg::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
.dt-sep { font-size:13px; color:var(--muted); line-height:1; padding:0 1px; pointer-events:none; flex-shrink:0; }
.dt-sep-space { width:7px; flex-shrink:0; }

.static-badge {
  font-size:10px; font-weight:600; color:var(--gold); background:var(--gold-bg);
  border:1px solid var(--gold-dim); border-radius:3px; padding:2px 7px;
  letter-spacing:.04em; white-space:nowrap;
}
.static-badge.hidden { display:none; }

/* ── MAP PANEL ── */
.map-panel { display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; }
.map-toolbar {
  display:flex; flex-direction:column;
  border-bottom:1px solid var(--border); background:var(--navy2);
  flex-shrink:0;
}
.map-toolbar-row1 {
  display:flex; align-items:center; flex-wrap:wrap; gap:10px;
  padding:9px 16px 8px; border-bottom:1px solid var(--border);
}
.map-toolbar-row1 .plot-name { flex-shrink:0; margin-right:4px; }
.map-toolbar-row2 {
  display:flex; align-items:center; flex-wrap:wrap; gap:10px;
  padding:8px 16px;
}
.color-by { display:flex; align-items:center; gap:7px; flex-shrink:0; }
.color-by-label { font-size:12px; font-weight:500; color:var(--muted); white-space:nowrap; }
.color-by select {
  background:var(--navy3); border:1px solid var(--border2); border-radius:4px;
  color:var(--text); font-family:var(--font); font-size:12px; padding:4px 10px;
  outline:none; cursor:pointer;
}
.color-by select:focus { border-color:var(--gold); }
.scrubber-wrap {
  display:flex; align-items:center; gap:7px; flex:1 1 260px; min-width:0;
}
.scrubber-label { font-size:12px; font-weight:500; color:var(--muted); white-space:nowrap; flex-shrink:0; }
input[type=range] { flex:1; min-width:80px; accent-color:var(--gold); height:3px; cursor:pointer; }
.replay-btn {
  background:transparent; border:1px solid var(--border2); border-radius:4px;
  color:var(--muted); font-family:var(--font); font-size:12px; font-weight:500;
  padding:4px 14px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:color .15s,border-color .15s,background .15s;
}
.replay-btn:hover { color:var(--text); border-color:var(--gold); }
.replay-btn.playing { color:var(--gold); border-color:var(--gold-dim); background:var(--gold-bg); }
.speed-wrap { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.speed-label { font-size:12px; color:var(--muted); }
.speed-select { background:var(--navy3); border:1px solid var(--border2); border-radius:4px; color:var(--text); font-family:var(--font); font-size:12px; padding:3px 8px; outline:none; }
.map-legend { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.legend-grad { width:80px; height:6px; border-radius:3px; background:linear-gradient(to right,#4caf7d,#c9a84c,#e05c4a); }
.legend-lo, .legend-hi { font-size:11px; color:var(--muted); }
.map-wrap { flex:1; position:relative; min-height:0; }
#leafletMap { position:absolute; inset:0; }

/* ── CALCULATIONS TAB ── */
.calc-toolbar {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  padding:9px 20px; background:var(--navy2);
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.calc-toolbar-label { font-size:11px; font-weight:700; color:var(--gold); letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; }
.calc-body {
  flex:1; overflow-y:auto; padding:20px 20px 32px; background:var(--navy);
}
.calc-empty { height:100%; display:flex; align-items:center; justify-content:center; }
.calc-section-title {
  font-size:11px; font-weight:700; color:var(--gold);
  letter-spacing:.08em; text-transform:uppercase;
  margin:24px 0 12px; border-bottom:1px solid var(--border); padding-bottom:6px;
}
.calc-section-title:first-child { margin-top:0; }
.stat-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; margin-bottom:8px;
}
.stat-card {
  background:var(--navy2); border:1px solid var(--border);
  border-radius:6px; padding:12px 14px;
  border-top:2px solid var(--card-color,var(--gold));
}
.stat-card-label { font-size:11px; font-weight:500; color:var(--muted); margin-bottom:5px; }
.stat-card-value { font-size:22px; font-weight:700; color:var(--card-color,var(--text)); line-height:1.1; }
.stat-card-unit { font-size:12px; font-weight:400; color:var(--muted); margin-left:3px; }
.mini-charts-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-bottom:8px;
}
.mini-chart-card {
  background:var(--navy2); border:1px solid var(--border); border-radius:6px; overflow:hidden;
}
.mini-chart-title {
  font-size:11px; font-weight:600; color:var(--muted);
  padding:8px 12px 6px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:6px;
}
.mini-chart-title .dot { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
.mini-chart-canvas { display:block; width:100%; height:120px; }

/* dark-mode leaflet */
.leaflet-layer,.leaflet-control-zoom-in,.leaflet-control-zoom-out,.leaflet-control-attribution {
  filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
}
.leaflet-control-attribution { background:rgba(13,27,42,.75) !important; color:var(--muted) !important; font-size:9px !important; }
.leaflet-control-attribution a { color:var(--muted) !important; }
.leaflet-bar a { background:var(--navy2) !important; color:var(--text) !important; border-color:var(--border2) !important; }
.leaflet-bar a:hover { background:var(--navy3) !important; }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">UBC <span>Solar</span></div>
    <nav class="top-tabs">
      <button class="top-tab active" id="tabData" onclick="switchTab('data')">Data</button>
      <button class="top-tab" id="tabCalc" onclick="switchTab('calc')">Calculations</button>
    </nav>
    <div class="header-search">
      <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Search signals…" id="signalSearch" oninput="filterSignals(this.value)">
    </div>
  </header>

  <div class="body-layout" id="bodyLayout">

    <!-- ── SIDEBAR ── -->
    <div id="sidebar">
      <div class="sidebar-inner">

        <div class="sidebar-scroll" id="sidebarScroll"></div>

        <!-- Map view button -->
        <div class="sidebar-map-btn" id="sidebarMapBtn" onclick="activateMap()">
          <div class="sidebar-map-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
              <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
            </svg>
          </div>
          <div>
            <div class="sidebar-map-label">Map View</div>
            <div class="sidebar-map-sub" id="mapGpsSub">GPS Track</div>
          </div>
        </div>



      </div>
    </div>

    <!-- Sidebar toggle (sibling of sidebar so it tracks the sidebar edge) -->
    <div id="sidebarToggle" onclick="toggleSidebar()">
      <svg id="sidebarToggleIcon" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <polyline points="6 2 3 5 6 8"/>
      </svg>
    </div>

    <!-- ── MAIN CONTENT ── -->
    <div id="mainContent">

      <!-- Data tab -->
      <div id="dataTab">
        <div id="mainArea">
          <div class="plot-panel" id="plotPanel">
            <div class="plot-empty">
              <div class="plot-empty-hint">Select a signal from the sidebar to view its plot</div>
              <div class="plot-empty-sub">Hold Ctrl / ⌘ to overlay up to 3 signals</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Calculations tab -->
      <div id="calcTab">
        <div class="calc-toolbar">
          <span class="calc-toolbar-label">Time Range</span>
          <span class="ts-label">From</span>
          <span id="dtCalcFrom" class="dt-picker"></span>
          <span class="ts-label">To</span>
          <span id="dtCalcTo" class="dt-picker"></span>
          <button class="ts-apply" onclick="runCalculations()">Analyse</button>
          <span id="calcStatus" class="static-badge hidden"></span>
        </div>
        <div id="calcBody" class="calc-body">
          <div class="calc-empty">
            <div class="plot-empty-hint">Set a time range and click Analyse to see aggregate statistics</div>
          </div>
        </div>
      </div>

    </div><!-- /#mainContent -->
  </div><!-- /.body-layout -->
</div><!-- /.shell -->

<script>

// ─── SIDEBAR BUILDER ─────────────────────────────────────────────────────────
let activeFields = new Set();
let activeField  = null;  // kept for map compat

function buildSidebar() {
  const scroll = document.getElementById('sidebarScroll');
  scroll.innerHTML = '';

  STAGES.forEach(stage => {
    const signals = SIGNALS.filter(s => s.stage === stage.id);
    if (!signals.length) return;

    const group = document.createElement('div');
    group.className = 'stage-group open';
    group.dataset.stage = stage.id;

    const header = document.createElement('div');
    header.className = 'stage-header';
    header.innerHTML = `
      <div class="stage-dot" style="background:${stage.color}"></div>
      <div class="stage-name">${stage.label}</div>
      <div class="stage-count">${signals.length}</div>
      <svg class="stage-chevron" width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="4 2 8 6 4 10"/></svg>
    `;
    header.addEventListener('click', () => group.classList.toggle('open'));

    const sigList = document.createElement('div');
    sigList.className = 'stage-signals';

    signals.forEach(sig => {
      const row = document.createElement('div');
      row.className = 'signal-row';
      row.id = 'sigrow-' + sig.field;
      row.style.setProperty('--stage-color', stage.color);
      row.dataset.label = (sig.label + ' ' + sig.field + ' ' + sig.unit).toLowerCase();
      row.innerHTML = `
        <div class="sig-name" title="${sig.help}">${sig.label}</div>
        <div class="sig-value" id="sigval-${sig.field}">—</div>
        <div class="sig-unit">${sig.unit}</div>
      `;
      row.addEventListener('click', (e) => {
        const multiSelect = e.ctrlKey || e.metaKey;
        activateSignal(sig.field, multiSelect);
      });
      sigList.appendChild(row);
    });

    group.appendChild(header);
    group.appendChild(sigList);
    scroll.appendChild(group);
  });
}

// ─── SIGNAL ACTIVATION ───────────────────────────────────────────────────────
function activateSignal(field, multiSelect) {
  const sig = SIGNALS.find(s => s.field === field);
  if (!sig) return;

  stopLoop();
  clearMapPanel();
  activeField = null;
  document.getElementById('sidebarMapBtn').classList.remove('active');

  if (multiSelect) {
    if (activeFields.has(field)) activeFields.delete(field);
    else if (activeFields.size < 3) activeFields.add(field);
  } else {
    if (activeFields.size === 1 && activeFields.has(field)) {
      activeFields.clear();
    } else {
      activeFields.clear();
      activeFields.add(field);
    }
  }

  // Update row highlights
  SIGNALS.forEach(s => {
    const row = document.getElementById('sigrow-' + s.field);
    if (row) row.classList.toggle('active', activeFields.has(s.field));
  });

  if (activeFields.size === 0) {
    const area = document.getElementById('mainArea');
    area.innerHTML = '<div class="plot-panel"><div class="plot-empty"><div class="plot-empty-hint">Select a signal from the sidebar</div><div class="plot-empty-sub">Hold Ctrl / ⌘ to overlay up to 3 signals</div></div></div>';
    return;
  }

  let pp = document.getElementById('plotPanel');
  const hasCanvas = pp && !!pp.querySelector('#plotCanvas');
  if (!hasCanvas) {
    const area = document.getElementById('mainArea');
    area.innerHTML = '';
    pp = document.createElement('div');
    pp.id = 'plotPanel'; pp.className = 'plot-panel';
    area.appendChild(pp);
    buildChartPanel();
  } else {
    updateChartLegend();
  }
  if (staticMode) render(); else startLoop();
}

let rafId = null;

        <button class="mode-btn ${!staticMode?'on':''}" id="btnLive" onclick="setMode('live')">⬤ Live</button>
        <div class="mode-divider"></div>
        <button class="mode-btn ${staticMode?'on':''}" id="btnStatic" onclick="setMode('static')">⬛ Static</button>
      </div>

      <div class="static-inputs ${staticMode?'':'hidden'}" id="staticInputs">
        <span class="ts-label">From</span>
        <span id="dtFrom" class="dt-picker"></span>
        <span class="ts-label">To</span>
        <span id="dtTo" class="dt-picker"></span>

      </div>

      <div class="static-inputs ${!staticMode?'':'hidden'}" id="liveInputs">

          <button class="preset" onclick="setWin(60,this)">1m</button>

          <input class="win-num" id="winNum" type="number" min="5" max="3600" value="${windowSec}">

        </div>
      </div>

  if (winNumEl) winNumEl.addEventListener('change', function() {

function updateChartLegend() {
  const el = document.getElementById('chartLegend');
  if (!el) return;
  el.innerHTML = '';
  SIGNALS.filter(m => activeFields.has(m.field)).forEach(m => {
    const chip = document.createElement('div');
    chip.style.cssText = `display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 8px 3px 6px;border-radius:4px;border:1px solid ${m.color}40;background:${m.color}10;transition:background .15s;`;
    chip.title = 'Click to remove ' + m.label;
    chip.innerHTML = `<span style="width:8px;height:8px;border-radius:50%;background:${m.color};flex-shrink:0;"></span><span style="font-size:12px;font-weight:600;color:${m.color};white-space:nowrap;">${m.label}</span><span style="font-size:11px;color:var(--muted);margin-left:2px;">${m.unit}</span>`;
    chip.addEventListener('mouseenter', () => chip.style.background = m.color + '20');
    chip.addEventListener('mouseleave', () => chip.style.background = m.color + '10');
    chip.addEventListener('click', () => activateSignal(m.field, true));
    el.appendChild(chip);
  });
  if (activeFields.size < 3) {
    const hint = document.createElement('span');
    hint.style.cssText = 'font-size:11px;color:var(--muted);font-style:italic;';
    hint.textContent = activeFields.size === 1 ? 'Ctrl+click to overlay up to 2 more signals' : 'Ctrl+click to overlay 1 more signal';
    el.appendChild(hint);
  }
}

// ─── STATIC MODE ─────────────────────────────────────────────────────────────
let staticMode = false, staticFrom = null, staticTo = null;

function prefillStaticInputs() {
  const now = Date.now();
  dtSet('dtFrom', staticFrom || now - windowSec * 1000);
  dtSet('dtTo',   staticTo   || now);
}

function setMode(mode) {
  staticMode = (mode === 'static');
  document.getElementById('btnLive')  ?.classList.toggle('on', !staticMode);
  document.getElementById('btnStatic')?.classList.toggle('on',  staticMode);
  document.getElementById('staticInputs')?.classList.toggle('hidden', !staticMode);
  document.getElementById('liveInputs')  ?.classList.toggle('hidden',  staticMode);
  document.getElementById('staticBadge') ?.classList.toggle('hidden', !staticMode);
  if (staticMode) {
    if (!staticFrom || !staticTo) { staticTo = Date.now(); staticFrom = staticTo - windowSec * 1000; }
    prefillStaticInputs(); stopLoop(); render();
  } else { staticFrom = null; staticTo = null; startLoop(); }
}

function applyStaticRange() {
  const f = dtGet('dtFrom'), t = dtGet('dtTo');
  if (!f || !t || f >= t) {
    const flash = id => { const el = document.getElementById(id); if(el){el.style.borderColor='var(--red)'; setTimeout(()=>el.style.borderColor='',1200);} };
    flash('dtFrom'); flash('dtTo'); return;
  }
  staticFrom = f; staticTo = t; stopLoop(); render();
}

// ─── CANVAS RENDERER ─────────────────────────────────────────────────────────
function render() {
  const canvas = document.getElementById('plotCanvas');
  if (!canvas) return;
  const fields = activeField ? [activeField] : Array.from(activeFields);
  if (fields.length === 0) return;
  const metrics = fields.map(f => SIGNALS.find(x => x.field === f)).filter(Boolean);
  if (!metrics.length) return;

  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  if (!W || !H) return;
  canvas.width = W * dpr; canvas.height = H * dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr);

  let tStart, tEnd, isStatic = staticMode && staticFrom && staticTo;
  if (isStatic) { tStart = staticFrom; tEnd = staticTo; }
  else { tEnd = Date.now(); tStart = tEnd - windowSec * 1000; }
  const tSpan = tEnd - tStart || 1;

  const Y_AXIS_W = 44;
  const PAD = { t:12, b:24, l:Math.min(Y_AXIS_W * metrics.length, 140), r:12 };
  const cX = PAD.l, cY = PAD.t, cW = W - PAD.l - PAD.r, cH = H - PAD.t - PAD.b;
  const GRID = '#ffffff0a', AXIS = '#ffffff18', LABEL = '#7a8fa3', FONT = '10px Poppins,sans-serif';
  ctx.clearRect(0, 0, W, H); ctx.font = FONT;

  const seriesData = metrics.map(m => {
    const pts = history[m.field].filter(d => d.t >= tStart && d.t <= tEnd);
    let yMin = m.yMin, yMax = m.yMax;
    if (pts.length > 1) {
      const vs = pts.map(d => d.v), lo = Math.min(...vs), hi = Math.max(...vs);
      const pad = (hi - lo) * .12 || .5;
      const clo = Math.max(m.yMin, lo - pad), chi = Math.min(m.yMax, hi + pad);
      if (clo < chi) { yMin = clo; yMax = chi; }
    }
    return { m, pts, yMin, yMax, yRange: (yMax - yMin) || 1 };
  });

  const toX = t => cX + ((t - tStart) / tSpan) * cW;

  for (let i = 0; i <= 5; i++) {
    const y = cY + cH - (i / 5) * cH;
    ctx.strokeStyle = GRID; ctx.lineWidth = .5;
    ctx.beginPath(); ctx.moveTo(cX, y); ctx.lineTo(cX + cW, y); ctx.stroke();
  }

  seriesData.forEach((s, idx) => {
    const axX = PAD.l - Y_AXIS_W * (idx + 1);
    const toY = v => cY + cH - ((v - s.yMin) / s.yRange) * cH;
    ctx.font = FONT;
    for (let i = 0; i <= 5; i++) {
      const v = s.yMin + (s.yRange / 5) * i;
      ctx.fillStyle = s.m.color + 'cc'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(v.toFixed(s.m.decimals <= 1 ? 1 : 2), axX + Y_AXIS_W - 4, cY + cH - (i/5)*cH);
    }
    ctx.strokeStyle = s.m.color + '60'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(axX + Y_AXIS_W, cY); ctx.lineTo(axX + Y_AXIS_W, cY + cH); ctx.stroke();
    ctx.save(); ctx.font = '9px Poppins,sans-serif'; ctx.fillStyle = s.m.color + '99';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.translate(axX + 7, cY + cH / 2); ctx.rotate(-Math.PI / 2);
    ctx.fillText(s.m.unit, 0, 0); ctx.restore();
  });

  const xN = Math.max(2, Math.min(8, Math.floor(cW / 90)));
  ctx.font = FONT; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let i = 0; i <= xN; i++) {
    const t = tStart + (i / xN) * tSpan, x = toX(t);
    let label;
    if (isStatic) {
      const d = new Date(t);
      label = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
    } else {
      const s = Math.round((tEnd - t) / 1000);
      label = s === 0 ? 'now' : `-${s}s`;
    }
    ctx.fillStyle = LABEL; ctx.fillText(label, x, cY + cH + 6);
    ctx.strokeStyle = AXIS; ctx.lineWidth = .5;
    ctx.beginPath(); ctx.moveTo(x, cY + cH); ctx.lineTo(x, cY + cH + 3); ctx.stroke();
  }

  ctx.strokeStyle = AXIS; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cX, cY); ctx.lineTo(cX, cY + cH); ctx.lineTo(cX + cW, cY + cH); ctx.stroke();

  seriesData.forEach(s => {
    const { m, pts, yMin, yRange } = s;
    const toY = v => cY + cH - ((v - yMin) / yRange) * cH;
    if (pts.length < 2) {
      if (seriesData.length === 1) {
        ctx.fillStyle = LABEL; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = '11px Poppins,sans-serif';
        ctx.fillText(isStatic ? 'No data in selected range' : 'Waiting for data…', cX + cW / 2, cY + cH / 2);
      }
      return;
    }
    ctx.save(); ctx.beginPath(); ctx.rect(cX, cY, cW, cH); ctx.clip();
    if (yMin < 0 && (yMin + yRange) > 0) {
      const z = toY(0);
      ctx.strokeStyle = m.color + '30'; ctx.lineWidth = 1; ctx.setLineDash([4, 5]);
      ctx.beginPath(); ctx.moveTo(cX, z); ctx.lineTo(cX + cW, z); ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.beginPath(); ctx.moveTo(toX(pts[0].t), toY(pts[0].v));
    pts.slice(1).forEach(p => ctx.lineTo(toX(p.t), toY(p.v)));
    ctx.lineTo(toX(pts[pts.length-1].t), cY + cH); ctx.lineTo(toX(pts[0].t), cY + cH);
    ctx.closePath();
    ctx.fillStyle = m.color + (seriesData.length > 1 ? '08' : '14'); ctx.fill();
    ctx.beginPath(); ctx.moveTo(toX(pts[0].t), toY(pts[0].v));
    pts.slice(1).forEach(p => ctx.lineTo(toX(p.t), toY(p.v)));
    ctx.strokeStyle = m.color; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();
    if (!isStatic) {
      const lp = pts[pts.length-1];
      ctx.beginPath(); ctx.arc(toX(lp.t), toY(lp.v), 3.5, 0, Math.PI*2);
      ctx.fillStyle = m.color; ctx.fill();
      ctx.strokeStyle = '#0d1b2a'; ctx.lineWidth = 1.5; ctx.stroke();
    }
    ctx.restore();
  });
}

function metricToColor(norm) {
  const r = norm < .5 ? Math.round(76 + (201-76)*norm*2) : Math.round(201+(224-201)*(norm-.5)*2);
  const g = norm < .5 ? Math.round(175+(168-175)*norm*2) : Math.round(168+(92-168)*(norm-.5)*2);
  const b = norm < .5 ? Math.round(61+(76-61)*norm*2)    : Math.round(76+(74-76)*(norm-.5)*2);
  return `rgb(${r},${g},${b})`;
}

function drawMapTrace() {
  if (!leafletMap) return;
  mapPolylines.forEach(p => p.remove()); mapPolylines = [];
  if (replayMarker) { replayMarker.remove(); replayMarker = null; }
  const n = gpsHistory.length;
  if (n < 2) { leafletMap.setView([49.2827, -123.1207], 13); return; }

  const iStart = Math.floor(mapRangeStart * (n - 1));
  const iEnd   = Math.ceil(mapRangeEnd * (n - 1));
  const pts    = gpsHistory.slice(iStart, iEnd + 1);
  if (pts.length < 2) return;

  const mDef = SIGNALS.find(x => x.field === colorByField);
  const mHist = history[colorByField];
  let allVals = [];
  pts.forEach(p => { const v = nearestMetric(mHist, p.t); if (v !== null) allVals.push(v); });
  const vMin = allVals.length ? Math.min(...allVals) : 0;
  const vMax = allVals.length ? Math.max(...allVals) : 1;
  const vRange = vMax - vMin || 1;

  const legendLo = document.getElementById('legendLo');
  const legendHi = document.getElementById('legendHi');
  if (legendLo) legendLo.textContent = vMin.toFixed(mDef ? mDef.decimals : 1) + (mDef ? ' ' + mDef.unit : '');
  if (legendHi) legendHi.textContent = vMax.toFixed(mDef ? mDef.decimals : 1) + (mDef ? ' ' + mDef.unit : '');

  const BUCKETS = 32;
  let runLatLngs = [[pts[0].lat, pts[0].lon]], runBucket = -1, prevCol = null;
  const flushRun = col => {
    if (runLatLngs.length < 2) return;
    mapPolylines.push(L.polyline(runLatLngs, { color:col, weight:4, opacity:.95, smoothFactor:1.5, lineJoin:'round', lineCap:'round' }).addTo(leafletMap));
  };
  for (let i = 0; i < pts.length - 1; i++) {
    const v = nearestMetric(mHist, pts[i].t);
    const norm = v !== null ? (v - vMin) / vRange : 0.5;
    const bucket = Math.round(norm * (BUCKETS - 1));
    const col = metricToColor(norm);
    if (bucket !== runBucket) {
      flushRun(prevCol || col);
      runLatLngs = runLatLngs.length > 0 ? [runLatLngs[runLatLngs.length-1], [pts[i].lat, pts[i].lon]] : [[pts[i].lat, pts[i].lon]];
      runBucket = bucket;
    } else { runLatLngs.push([pts[i].lat, pts[i].lon]); }
    prevCol = col;
  }
  if (pts.length > 1) runLatLngs.push([pts[pts.length-1].lat, pts[pts.length-1].lon]);
  flushRun(prevCol || metricToColor(0.5));
  if (!mapFitted) { leafletMap.fitBounds(L.latLngBounds(pts.map(p => [p.lat, p.lon])), { padding:[24,24] }); mapFitted = true; }
  updateScrubInfo(iStart, iEnd, n);
}

function nearestMetric(hist, t) {
  if (!hist || !hist.length) return null;
  let lo = 0, hi = hist.length - 1;
  while (lo < hi) { const mid = (lo+hi)>>1; if (hist[mid].t < t) lo = mid+1; else hi = mid; }
  return hist[lo] ? hist[lo].v : null;
}

function setColorBy(field) { colorByField = field; drawMapTrace(); }

function onScrub(which) {
  const sEl = document.getElementById('scrubStart'), eEl = document.getElementById('scrubEnd');
  let s = parseInt(sEl.value), e = parseInt(eEl.value);
  if (s > e) { if (which === 'start') { sEl.value = e; s = e; } else { eEl.value = s; e = s; } }
  mapRangeStart = s / 1000; mapRangeEnd = e / 1000;
  syncTimeInputs(); stopReplay(); drawMapTrace();
}

function onMapPickerChange(which) {
  const n = gpsHistory.length; if (n < 2) return;
  const tFirst = gpsHistory[0].t, tLast = gpsHistory[n-1].t, tSpan = tLast - tFirst || 1;
  if (which === 'start') {
    const t = dtGet('dtMapStart'); if (!t) return;
    mapRangeStart = Math.max(0, Math.min(1, (t - tFirst) / tSpan));
    if (mapRangeStart >= mapRangeEnd) mapRangeStart = Math.max(0, mapRangeEnd - 0.001);
    document.getElementById('scrubStart').value = Math.round(mapRangeStart * 1000);
  } else {
    const t = dtGet('dtMapEnd'); if (!t) return;
    mapRangeEnd = Math.max(0, Math.min(1, (t - tFirst) / tSpan));
    if (mapRangeEnd <= mapRangeStart) mapRangeEnd = Math.min(1, mapRangeStart + 0.001);
    document.getElementById('scrubEnd').value = Math.round(mapRangeEnd * 1000);
  }
  stopReplay(); drawMapTrace();
}

function syncTimeInputs() {
  const n = gpsHistory.length; if (n < 2) return;
  const tFirst = gpsHistory[0].t, tLast = gpsHistory[n-1].t;
  const tSpan = tLast - tFirst || 1;
  dtSet('dtMapStart', tFirst + mapRangeStart * tSpan);
  dtSet('dtMapEnd',   tFirst + mapRangeEnd   * tSpan);
}

function updateScrubInfo(iStart, iEnd, n) {
  const tFirst = gpsHistory[0]?.t, tLast = gpsHistory[n-1]?.t;
  if (!tFirst || !tLast) return;
  syncTimeInputs();
}

function toggleReplay() {
  const btn = document.getElementById('replayBtn');
  if (isPlaying) { stopReplay(); return; }
  isPlaying = true; btn?.classList.add('playing');
  if (btn) btn.textContent = '⏹ Stop';
  const n = gpsHistory.length;
  const iStart = Math.floor(mapRangeStart*(n-1)), iEnd = Math.ceil(mapRangeEnd*(n-1));
  const pts = gpsHistory.slice(iStart, iEnd+1);
  if (pts.length < 2) { stopReplay(); return; }
  replayIdx = 0;
  if (replayMarker) replayMarker.remove();
  const carIcon = L.divIcon({ className:'', html:`<div style="width:12px;height:12px;border-radius:50%;background:#c9a84c;border:2px solid #fff;box-shadow:0 0 6px #c9a84c88;"></div>`, iconSize:[12,12], iconAnchor:[6,6] });
  replayMarker = L.marker([pts[0].lat,pts[0].lon],{icon:carIcon,zIndexOffset:1000}).addTo(leafletMap);
  function step() {
    if (!isPlaying) return;
    replayIdx++;
    if (replayIdx >= pts.length) { stopReplay(); return; }
    replayMarker.setLatLng([pts[replayIdx].lat,pts[replayIdx].lon]);
    const speedMul = parseFloat(document.getElementById('replaySpeed')?.value||10);
    const dtReal = replayIdx < pts.length-1 ? pts[replayIdx+1].t - pts[replayIdx].t : 500;
    replayTimer = setTimeout(step, Math.max(16, dtReal/speedMul));
  }
  replayTimer = setTimeout(step, 100);
}

function stopReplay() {
  isPlaying = false; clearTimeout(replayTimer); replayTimer = null;
  const btn = document.getElementById('replayBtn');
  if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Replay'; }
}

// ─── DATA PIPELINE ───────────────────────────────────────────────────────────
function push(field, t, raw) {
  const m = SIGNALS.find(x => x.field === field);
  if (!m) return;
  const v = m.transform ? m.transform(raw) : raw;
  const h = history[field];
  h.push({ t, v });
  const cut = Date.now() - MAX_MS;
  while (h.length && h[0].t < cut) h.shift();

  const lat_ = latest[field];
  lat_.prev = lat_.value; lat_.value = v;

  // Sidebar live value
  const valEl = document.getElementById('sigval-' + field);
  if (valEl) valEl.textContent = v.toFixed(m.decimals);

  // Vitals strip
  if (field === 'TotalPackVoltage') { const el = document.getElementById('vital-voltage'); if(el) el.firstChild.textContent = v.toFixed(1); }
  if (field === 'SOC')              { const el = document.getElementById('vital-soc');     if(el) el.firstChild.textContent = (v*100).toFixed(1); }
  if (field === 'VehicleVelocity') { const el = document.getElementById('vital-speed');   if(el) el.firstChild.textContent = v.toFixed(1); }
  if (field === 'PackPower')        { const el = document.getElementById('vital-power');   if(el) el.firstChild.textContent = v.toFixed(0); }
}

function pushGPS(t, lat, lon) {
  gpsHistory.push({ t, lat, lon });
  const cut = Date.now() - MAX_MS;
  while (gpsHistory.length && gpsHistory[0].t < cut) gpsHistory.shift();
  const dEl = document.getElementById('mapGpsSub');
  if (dEl) dEl.textContent = gpsHistory.length + ' pts';
  if (leafletMap && gpsHistory.length >= 2 && !isPlaying) {
    const n = gpsHistory.length, i = n-2;
    const iS = Math.floor(mapRangeStart*(n-1)), iE = Math.ceil(mapRangeEnd*(n-1));
    if (i >= iS && i < iE && n % 5 === 0) drawMapTrace();
  }
}

function ingest(data) {
  const now = Date.now();
  SIGNALS.forEach(m => { if (data[m.field] !== undefined) push(m.field, now, data[m.field]); });
  if (data.lat !== undefined && data.lon !== undefined) pushGPS(data.timestamp || now, data.lat, data.lon);
}

// ─── SIGNAL SEARCH ───────────────────────────────────────────────────────────
function filterSignals(q) {
  const query = q.trim().toLowerCase();
  const scroll = document.getElementById('sidebarScroll');
  scroll.querySelectorAll('.signal-row').forEach(row => {
    const match = !query || row.dataset.label.includes(query);
    row.classList.toggle('hidden-search', !match);
  });
  // collapse/expand stage groups based on visible signals
  scroll.querySelectorAll('.stage-group').forEach(group => {
    const visible = group.querySelectorAll('.signal-row:not(.hidden-search)').length;
    if (query) {
      group.classList.toggle('open', visible > 0);
    }
  });
}

let wpIdx = 0;
// Dummy state for all signals
const ds = {
  TotalPackVoltage: 120, AcceleratorPosition: 0.3, BatteryCurrent: 50, BatteryCurrentDir: 0,
  BatteryVoltage: 115, CurrentSensor1: 4.2, CurrentSensor2: 3.8, MechBrakePressed: 0,
  PackCurrent: 48, VehicleVelocity: 15, VoltSensor1: 50, VoltSensor2: 49, VoltageofLeast: 3.8,
  PackPower: 5800, MotorPower: 5500,
  EnergyVOLExtrapolated: 2400, IntegratedPackPower: -120, EnergyFromIntegratedPower: 2280,
  Efficiency1Hour: 280, Efficiency5Minute: 300, EfficiencyLap: 290,
  LapIndex: 3, TrackIndex: 0.45, LapIndexIntegrated: 3, LapIndexSpreadsheet: 3,
  TrackDistSpreadsheet: 2268, TrackIdxSpreadsheet: 0.45,
  AirTemperature: 28, Azimuth: 15, DHI: 80, DNI: 650, GHI: 700,

function dummyTick() {
  const w = (v, s, lo, hi) => Math.min(hi, Math.max(lo, v + (Math.random()-.5)*s));
  // ingress
  ds.TotalPackVoltage    = w(ds.TotalPackVoltage, 0.5, 80, 160);
  ds.AcceleratorPosition = w(ds.AcceleratorPosition, 0.05, 0, 1);
  ds.BatteryCurrent      = w(ds.BatteryCurrent, 5, -50, 200);
  ds.BatteryCurrentDir   = ds.BatteryCurrent < 0 ? 1 : 0;
  ds.BatteryVoltage      = w(ds.BatteryVoltage, 0.4, 0, 160);
  ds.CurrentSensor1      = w(ds.CurrentSensor1, 0.2, 0, 10);
  ds.CurrentSensor2      = w(ds.CurrentSensor2, 0.2, 0, 10);
  ds.MechBrakePressed    = Math.random() < 0.02 ? 1 : 0;
  ds.PackCurrent         = w(ds.PackCurrent, 4, -50, 200);
  ds.VehicleVelocity     = w(ds.VehicleVelocity, 1, 0, 50);
  ds.VoltSensor1         = w(ds.VoltSensor1, 0.3, 0, 80);
  ds.VoltSensor2         = w(ds.VoltSensor2, 0.3, 0, 80);
  ds.VoltageofLeast      = w(ds.VoltageofLeast, 0.01, 2.5, 4.2);
  // power
  ds.PackPower           = ds.PackCurrent * ds.TotalPackVoltage;
  ds.MotorPower          = ds.BatteryCurrent * ds.BatteryVoltage * (ds.BatteryCurrentDir ? -1:1);
  // energy
  ds.EnergyVOLExtrapolated    = w(ds.EnergyVOLExtrapolated, 5, 0, 5000);
  ds.IntegratedPackPower      = w(ds.IntegratedPackPower, 3, -500, 5000);
  ds.EnergyFromIntegratedPower= w(ds.EnergyFromIntegratedPower, 5, 0, 5000);
  // efficiency
  ds.Efficiency1Hour     = w(ds.Efficiency1Hour, 5, 0, 800);
  ds.Efficiency5Minute   = w(ds.Efficiency5Minute, 8, 0, 800);
  ds.EfficiencyLap       = w(ds.EfficiencyLap, 6, 0, 800);
  // localization
  ds.LapIndex            = Math.floor(w(ds.LapIndex, 0.01, 0, 60));
  ds.TrackIndex          = w(ds.TrackIndex, 0.005, 0, 1);
  ds.LapIndexIntegrated  = ds.LapIndex;
  ds.LapIndexSpreadsheet = ds.LapIndex;
  ds.TrackDistSpreadsheet= ds.TrackIndex * 5040;
  ds.TrackIdxSpreadsheet = ds.TrackIndex;
  // weather
  ds.AirTemperature      = w(ds.AirTemperature, 0.05, -10, 45);
  ds.Azimuth             = w(ds.Azimuth, 0.1, -180, 180);
  ds.DHI                 = w(ds.DHI, 2, 0, 400);
  ds.DNI                 = w(ds.DNI, 5, 0, 1000);
  ds.GHI                 = w(ds.GHI, 5, 0, 1200);
  ds.PrecipitationRate   = w(ds.PrecipitationRate, 0.01, 0, 50);

  // SOC
  ds.UnfilteredSOC       = w(ds.UnfilteredSOC, 0.001, 0, 1);
  ds.SOC                 = w(ds.SOC, 0.0008, 0, 1);

  const pt = WAYPOINTS[wpIdx % WAYPOINTS.length]; wpIdx++;
  const now = Date.now();
  pushGPS(now, pt[0], pt[1]);
  SIGNALS.forEach(sig => { if (ds[sig.field] !== undefined) push(sig.field, now, ds[sig.field]); });
}

// ─── DATETIME PICKER ─────────────────────────────────────────────────────────
const dtState = {};
const DT_SEGS = [
  { key:'y',  w:42, min:2020, max:2099, pad:4 }, { sep:'-' },
  { key:'mo', w:24, min:1,    max:12,   pad:2 }, { sep:'-' },
  { key:'d',  w:24, min:1,    max:31,   pad:2 }, { sep:' ', cls:'dt-sep-space' },
  { key:'h',  w:24, min:0,    max:23,   pad:2 }, { sep:':' },
  { key:'mi', w:24, min:0,    max:59,   pad:2 }, { sep:':' },
  { key:'s',  w:24, min:0,    max:59,   pad:2 },
];

function dtInit(id, onChange) {
  const wrap = document.getElementById(id); if (!wrap) return;
  wrap.innerHTML = '';
  const now = new Date();
  dtState[id] = { y:now.getFullYear(), mo:now.getMonth()+1, d:now.getDate(), h:now.getHours(), mi:now.getMinutes(), s:now.getSeconds(), onChange: onChange||null };
  DT_SEGS.forEach(def => {
    if (def.sep !== undefined) { const sp = document.createElement('span'); sp.className = def.cls||'dt-sep'; sp.textContent = def.sep; wrap.appendChild(sp); return; }
    const inp = document.createElement('input');
    inp.type='number'; inp.className='dt-seg'; inp.style.width=def.w+'px';
    inp.dataset.key=def.key; inp.dataset.min=def.min; inp.dataset.max=def.max; inp.dataset.pad=def.pad;
    inp.value = String(dtState[id][def.key]).padStart(def.pad,'0');
    inp.addEventListener('wheel', e => { e.preventDefault(); dtStep(id, inp, e.deltaY<0?1:-1); }, {passive:false});
    let dragY=null;
    inp.addEventListener('mousedown', e => { dragY=e.clientY; inp.focus(); e.preventDefault(); });
    inp.addEventListener('mousemove', e => { if(dragY===null) return; const delta=Math.round((dragY-e.clientY)/5); if(delta!==0){dtStep(id,inp,delta);dragY=e.clientY;} });
    inp.addEventListener('mouseup', ()=>{dragY=null;}); inp.addEventListener('mouseleave', ()=>{dragY=null;});
    inp.addEventListener('keydown', e=>{if(e.key==='ArrowUp'){e.preventDefault();dtStep(id,inp,1);}if(e.key==='ArrowDown'){e.preventDefault();dtStep(id,inp,-1);}});
    inp.addEventListener('change', ()=>{ const v=parseInt(inp.value); if(!isNaN(v)){dtState[id][def.key]=Math.max(def.min,Math.min(def.max,v));dtRefresh(id);dtState[id].onChange&&dtState[id].onChange();}});
    wrap.appendChild(inp);
  });
}

function dtStep(id, inp, delta) {
  const st=dtState[id]; if(!st) return;
  const key=inp.dataset.key, min=parseInt(inp.dataset.min), max=parseInt(inp.dataset.max), span=max-min+1;
  let v=st[key]+delta; v=min+((v-min)%span+span)%span;
  st[key]=v; inp.value=String(v).padStart(parseInt(inp.dataset.pad),'0');
  st.onChange&&st.onChange();
}

function dtRefresh(id) {
  const wrap=document.getElementById(id); if(!wrap||!dtState[id]) return;
  wrap.querySelectorAll('.dt-seg').forEach(inp=>{ inp.value=String(dtState[id][inp.dataset.key]).padStart(parseInt(inp.dataset.pad),'0'); });
}

function dtSet(id, ms) {
  if(!document.getElementById(id)) return;
  if(!dtState[id]) dtInit(id,null);
  const d=new Date(ms);
  Object.assign(dtState[id],{y:d.getFullYear(),mo:d.getMonth()+1,d:d.getDate(),h:d.getHours(),mi:d.getMinutes(),s:d.getSeconds()});
  dtRefresh(id);
}

function dtGet(id) {
  const st=dtState[id]; if(!st) return null;
  return new Date(st.y,st.mo-1,st.d,st.h,st.mi,st.s,0).getTime();
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
let activeTab = 'data';

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabData').classList.toggle('active', tab==='data');
  document.getElementById('tabCalc').classList.toggle('active', tab==='calc');

  if (tab === 'data') {
    document.getElementById('dataTab').classList.remove('hidden');
    document.getElementById('calcTab').classList.remove('active');
    document.getElementById('sidebar').classList.remove('hidden');
    document.getElementById('sidebarToggle').classList.remove('hidden');
    if (activeFields.size > 0 && !staticMode) startLoop();
    if (leafletMap) leafletMap.invalidateSize();
  } else {
    document.getElementById('dataTab').classList.add('hidden');
    document.getElementById('calcTab').classList.add('active');
    document.getElementById('sidebar').classList.add('hidden');
    document.getElementById('sidebarToggle').classList.add('hidden');
    stopLoop();
    if (!dtState['dtCalcFrom']) dtInit('dtCalcFrom', null);
    if (!dtState['dtCalcTo'])   dtInit('dtCalcTo',   null);
    prefillCalcInputs();
  }
}

function prefillCalcInputs() {
  const now = Date.now();
  dtSet('dtCalcFrom', now - windowSec*1000);
  dtSet('dtCalcTo',   now);
}

// ─── CALCULATIONS ENGINE ──────────────────────────────────────────────────────
function metricAt(hist, t) {
  if(!hist||!hist.length) return null;
  if(t<=hist[0].t) return hist[0].v; if(t>=hist[hist.length-1].t) return hist[hist.length-1].v;
  let lo=0,hi=hist.length-1;
  while(lo<hi-1){const mid=(lo+hi)>>1;if(hist[mid].t<=t)lo=mid;else hi=mid;}
  const frac=(t-hist[lo].t)/(hist[hi].t-hist[lo].t||1);
  return hist[lo].v+frac*(hist[hi].v-hist[lo].v);
}

function integrate(hist, tStart, tEnd) {
  if(!hist||!hist.length) return 0;
  const pts=hist.filter(p=>p.t>=tStart&&p.t<=tEnd); if(pts.length<2) return 0;
  let sum=0;
  for(let i=1;i<pts.length;i++){const dt=(pts[i].t-pts[i-1].t)/1000;sum+=0.5*(pts[i-1].v+pts[i].v)*dt;}
  return sum;
}

function average(hist, tStart, tEnd) {
  const pts=hist?hist.filter(p=>p.t>=tStart&&p.t<=tEnd):[];
  if(!pts.length) return null;
  return pts.reduce((s,p)=>s+p.v,0)/pts.length;
}

function runCalculations() {
  const statusEl=document.getElementById('calcStatus');
  const f=dtGet('dtCalcFrom'), t=dtGet('dtCalcTo');
  if(!f||!t||f>=t){
    const flash=id=>{const el=document.getElementById(id);if(el){el.style.borderColor='var(--red)';setTimeout(()=>el.style.borderColor='',1200);}};
    flash('dtCalcFrom');flash('dtCalcTo'); return;
  }
  statusEl.textContent='Computing…'; statusEl.classList.remove('hidden');

  const hists={};
  SIGNALS.forEach(m=>{hists[m.field]=history[m.field].filter(p=>p.t>=f&&p.t<=t);});
  const body=document.getElementById('calcBody');
  const durSec=(t-f)/1000;
  const avgSpeed=average(hists['VehicleVelocity'],f,t);
  const socStart=hists['SOC'].length?hists['SOC'][0].v:null;
  const socEnd=hists['SOC'].length?hists['SOC'][hists['SOC'].length-1].v:null;
  const deltaSoc=(socStart!==null&&socEnd!==null)?(socStart-socEnd):null;
  const motorEnergyKWh=integrate(hists['MotorPower'],f,t)/3600000;
  const packEnergyKWh =integrate(hists['PackPower'], f,t)/3600000;
  const avgMotor=average(hists['MotorPower'],f,t);
  const avgPack =average(hists['PackPower'], f,t);
  const fmt=(v,dec,fb='—')=>v!==null&&!isNaN(v)?v.toFixed(dec):fb;

  body.innerHTML=`
    <div class="calc-section-title">Summary</div>
    <div class="stat-grid">
      <div class="stat-card" style="--card-color:#60a5fa"><div class="stat-card-label">Duration</div><div class="stat-card-value">${fmt(durSec/60,1)}<span class="stat-card-unit">min</span></div></div>
      <div class="stat-card" style="--card-color:#60a5fa"><div class="stat-card-label">Avg Speed</div><div class="stat-card-value">${fmt(avgSpeed,2)}<span class="stat-card-unit">m/s</span></div></div>
      <div class="stat-card" style="--card-color:#4caf7d"><div class="stat-card-label">SOC Start</div><div class="stat-card-value">${fmt(socStart!==null?socStart*100:null,1)}<span class="stat-card-unit">%</span></div></div>
      <div class="stat-card" style="--card-color:#4caf7d"><div class="stat-card-label">SOC End</div><div class="stat-card-value">${fmt(socEnd!==null?socEnd*100:null,1)}<span class="stat-card-unit">%</span></div></div>
      <div class="stat-card" style="--card-color:${deltaSoc!==null&&deltaSoc>0?'var(--red)':'var(--green)'}"><div class="stat-card-label">Δ SOC</div><div class="stat-card-value">${deltaSoc!==null?(deltaSoc>0?'−':'+')+fmt(Math.abs(deltaSoc)*100,1):'—'}<span class="stat-card-unit">%</span></div></div>
      <div class="stat-card" style="--card-color:#e05c4a"><div class="stat-card-label">Motor Energy</div><div class="stat-card-value">${fmt(motorEnergyKWh*1000,1)}<span class="stat-card-unit">Wh</span></div></div>
      <div class="stat-card" style="--card-color:#f0a500"><div class="stat-card-label">Pack Energy</div><div class="stat-card-value">${fmt(packEnergyKWh*1000,1)}<span class="stat-card-unit">Wh</span></div></div>
      <div class="stat-card" style="--card-color:#e05c4a"><div class="stat-card-label">Avg Motor Power</div><div class="stat-card-value">${fmt(avgMotor!==null?avgMotor/1000:null,2)}<span class="stat-card-unit">kW</span></div></div>
      <div class="stat-card" style="--card-color:#f0a500"><div class="stat-card-label">Avg Pack Power</div><div class="stat-card-value">${fmt(avgPack!==null?avgPack/1000:null,2)}<span class="stat-card-unit">kW</span></div></div>
    </div>
    <div class="calc-section-title">Time-Series Graphs</div>
    <div class="mini-charts-grid" id="miniChartsGrid"></div>
  `;
  drawMiniCharts(f, t);
  statusEl.textContent='Done'; setTimeout(()=>statusEl.classList.add('hidden'),2000);
}

function drawMiniCharts(tFrom, tTo) {
  const grid=document.getElementById('miniChartsGrid'); if(!grid) return;
  grid.innerHTML='';
  SIGNALS.forEach(m=>{
    const pts=history[m.field].filter(p=>p.t>=tFrom&&p.t<=tTo);
    const card=document.createElement('div'); card.className='mini-chart-card';
    card.innerHTML=`<div class="mini-chart-title"><span class="dot" style="background:${m.color}"></span>${m.label}<span style="font-size:10px;color:var(--muted);margin-left:auto">${m.unit}</span></div><canvas class="mini-chart-canvas" width="280" height="120"></canvas>`;
    grid.appendChild(card);
    requestAnimationFrame(()=>{
      const canvas=card.querySelector('canvas');
      const dpr=window.devicePixelRatio||1;
      const W=canvas.offsetWidth||280,H=120;
      canvas.width=W*dpr;canvas.height=H*dpr;
      const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
      const PAD={t:8,b:20,l:38,r:8};
      const cW=W-PAD.l-PAD.r,cH=H-PAD.t-PAD.b;
      const LABEL='#7a8fa3',FONT='9px Poppins,sans-serif';
      ctx.clearRect(0,0,W,H);
      if(pts.length<2){ctx.fillStyle=LABEL;ctx.textAlign='center';ctx.textBaseline='middle';ctx.font='10px Poppins,sans-serif';ctx.fillText('No data',PAD.l+cW/2,PAD.t+cH/2);return;}
      const vs=pts.map(p=>p.v);
      const yMin=Math.min(...vs),yMax=Math.max(...vs),yRange=yMax-yMin||1;
      const tA=pts[0].t,tB=pts[pts.length-1].t,tSpan=tB-tA||1;
      const toX=t=>PAD.l+((t-tA)/tSpan)*cW;
      const toY=v=>PAD.t+cH-((v-yMin)/yRange)*cH;
      ctx.strokeStyle='#ffffff0a';ctx.lineWidth=.5;
      for(let i=0;i<=4;i++){const y=PAD.t+(i/4)*cH;ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(PAD.l+cW,y);ctx.stroke();}
      ctx.font=FONT;ctx.fillStyle=LABEL;ctx.textAlign='right';ctx.textBaseline='middle';
      for(let i=0;i<=4;i++){const v=yMin+(yRange/4)*(4-i);ctx.fillText(v.toFixed(m.decimals<=1?1:2),PAD.l-3,PAD.t+(i/4)*cH);}
      ctx.textAlign='center';ctx.textBaseline='top';
      const xN=Math.min(4,Math.max(1,Math.floor(cW/55)));
      const showSecs=tSpan<90000;
      for(let i=0;i<=xN;i++){const tt=tA+(i/xN)*tSpan;const d=new Date(tt);const lbl=showSecs?`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`:`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;ctx.fillText(lbl,toX(tt),PAD.t+cH+3);}
      ctx.strokeStyle='#ffffff18';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PAD.l,PAD.t);ctx.lineTo(PAD.l,PAD.t+cH);ctx.lineTo(PAD.l+cW,PAD.t+cH);ctx.stroke();
      ctx.beginPath();ctx.moveTo(toX(pts[0].t),toY(pts[0].v));pts.slice(1).forEach(p=>ctx.lineTo(toX(p.t),toY(p.v)));ctx.lineTo(toX(pts[pts.length-1].t),PAD.t+cH);ctx.lineTo(toX(pts[0].t),PAD.t+cH);ctx.closePath();ctx.fillStyle=m.color+'18';ctx.fill();
      ctx.beginPath();ctx.moveTo(toX(pts[0].t),toY(pts[0].v));pts.slice(1).forEach(p=>ctx.lineTo(toX(p.t),toY(p.v)));ctx.strokeStyle=m.color;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
    });
  });
}
